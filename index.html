edmbolos.<br>\n      Passe o n\u00famero de s\u00e9rie ao Especialista. Ele aplicar\u00e1 as regras do manual e ditar\u00e1 o c\u00f3digo.</div>\n      <div class=\"seq-display\" id=\"seq-display\"></div>\n      <div class=\"seq-keys\" id=\"seq-keys\"></div>\n      <div id=\"fb-cod\" class=\"feedback\"></div>\n    </div>`;\n  renderIgnDisplay(); renderIgnKeys(idx);\n}\nfunction renderIgnDisplay(){\n  const disp=document.getElementById('seq-display');\n  if(!disp) return; // defensive: content not loaded yet\n  disp.innerHTML='';\n  for(let i=0;i<5;i++){\n    const cell=document.createElement('div');\n    cell.className='seq-cell'+(ignCode[i]?' filled':'');\n    cell.id='ign-cell-'+i; cell.textContent=ignCode[i]||'?';\n    disp.appendChild(cell);\n  }\n}\nfunction renderIgnKeys(idx){\n  const keys=document.getElementById('seq-keys'); keys.innerHTML='';\n  IGN_POOL.forEach(sym=>{\n    const btn=document.createElement('button'); btn.className='seq-key'; btn.textContent=sym;\n    btn.onclick=()=>{\n      playClick();\n      if(ignCode.length<5){ignCode.push(sym);renderIgnDisplay();if(ignCode.length===5)checkCodigo(idx);}\n    };\n    keys.appendChild(btn);\n  });\n  const del=document.createElement('button'); del.className='seq-key del'; del.textContent='\u232b';\n  del.onclick=()=>{playClick();if(ignCode.length>0){ignCode.pop();renderIgnDisplay();}};\n  keys.appendChild(del);\n}\nfunction checkCodigo(idx){\n  const fb=document.getElementById('fb-cod');\n  if(!fb) return; // defensive: content not loaded yet\n  if(ignCode.every((v,i)=>v===ignTarget[i])){\n    for(let i=0;i<5;i++){const c=document.getElementById('ign-cell-'+i);if(c){c.classList.remove('filled');c.classList.add('correct');}}\n    fb.className='feedback ok'; fb.textContent='\u2713 C\u00f3digo correto! Igni\u00e7\u00e3o autorizada. M\u00f3dulo restaurado.';\n    playSuccess();\n    markDone(idx); setTimeout(()=>{if(currentMod===idx)goPanel();},2000);\n  } else {\n    for(let i=0;i<5;i++){const c=document.getElementById('ign-cell-'+i);if(c)c.classList.add('wrong');}\n    fb.className='feedback err'; fb.textContent='\u2717 C\u00f3digo incorreto. Reveja com o Especialista. +30s.';\n    setTimeout(()=>{ignCode=[];renderIgnDisplay();fb.className='feedback';},1200);\n    addStrike();\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  MOD-G: V\u00c1LVULAS\n//  Estado correto randomizado por condi\u00e7\u00f5es do serial + modelo.\n//  Manual tem a tabela de regras para derivar o estado.\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nconst VALVE_DEFS=[\n  {id:'VLV-01', name:'Entrada Alfa',    rule:'serialPar'},\n  {id:'VLV-02', name:'Bypass Beta',     rule:'vogal'},\n  {id:'VLV-03', name:'Sa\u00edda Gama',      rule:'somaGt12'},\n  {id:'VLV-04', name:'Press\u00e3o Delta',   rule:'modeloAlfaOuBeta'},\n  {id:'VLV-05', name:'C\u00e2mara \u00c9psilon',  rule:'serialPar_inv'},\n  {id:'VLV-06', name:'Retorno Zeta',    rule:'vogal_inv'},\n];\n// Regras: derivam o estado correto de cada v\u00e1lvula\nfunction valveCorrectState(rule){\n  switch(rule){\n    case 'serialPar':        return serialSum%2===0?'open':'closed';\n    case 'vogal':            return serialHasVowel?'open':'closed';\n    case 'somaGt12':         return serialSum>12?'open':'closed';\n    case 'modeloAlfaOuBeta': return (reactorModel==='ALFA'||reactorModel==='BETA')?'open':'closed';\n    case 'serialPar_inv':    return serialSum%2===0?'closed':'open';\n    case 'vogal_inv':        return serialHasVowel?'closed':'open';\n    default: return 'closed';\n  }\n}\nlet valveStates=[], valveCorrects=[];\n\nfunction buildValvulas(el,idx){\n  valveCorrects=VALVE_DEFS.map(v=>valveCorrectState(v.rule));\n  // Estado inicial: gerado aleatoriamente (mas garantindo ao menos 2 erradas)\n  do { valveStates=VALVE_DEFS.map(()=>Math.random()>.5?'open':'closed'); }\n  while(valveStates.every((s,i)=>s===valveCorrects[i])); // evita come\u00e7ar j\u00e1 certo\n\n  el.innerHTML=`\n    <div class=\"serial-box\">\n      <strong>S\u00c9RIE:</strong> ${serialNumber} &nbsp;|&nbsp; <strong>MOD-G</strong><br>\n      Diga ao Especialista: Modelo = <strong>${reactorModel}</strong> | Soma = <strong>${serialSum}</strong> | Vogal = <strong>${serialHasVowel?'SIM':'N\u00c3O'}</strong><br>\n      Informe o estado atual de cada v\u00e1lvula. Ele calcular\u00e1 os estados corretos.\n    </div>\n    <div class=\"challenge-box\">\n      <div class=\"challenge-title\">SISTEMA: Painel de Controle de V\u00e1lvulas</div>\n      <div class=\"challenge-desc\">Seis v\u00e1lvulas est\u00e3o em estados aleat\u00f3rios.<br>\n      Informe os IDs e estados ao Especialista. Ele consultar\u00e1 as regras e dir\u00e1 quais mudar.</div>\n      <div class=\"valves-grid\" id=\"valves-grid\"></div>\n      <button class=\"btn-primary\" onclick=\"checkValvulas(${idx})\" style=\"margin-top:1rem\">Confirmar configura\u00e7\u00e3o</button>\n      <div id=\"fb-vlv\" class=\"feedback\"></div>\n    </div>`;\n  renderValves();\n}\nfunction renderValves(){\n  const grid=document.getElementById('valves-grid'); grid.innerHTML='';\n  VALVE_DEFS.forEach((v,i)=>{\n    const state=valveStates[i];\n    const card=document.createElement('div');\n    card.className=`valve-card ${state==='open'?'open-v':'closed-v'}`;\n    card.id='vlv-'+i; card.onclick=()=>toggleValve(i);\n    card.innerHTML=`\n      <div class=\"valve-id\">${v.id}</div>\n      <div class=\"valve-icon\">${state==='open'?'\ud83d\udfe2':'\ud83d\udd34'}</div>\n      <div style=\"font-size:12px;font-weight:bold;margin-bottom:4px\">${v.name}</div>\n      <div class=\"valve-label\">${state==='open'?'ABERTA':'FECHADA'}</div>`;\n    grid.appendChild(card);\n  });\n}\nfunction toggleValve(i){ playClick(); valveStates[i]=valveStates[i]==='open'?'closed':'open'; renderValves(); }\nfunction checkValvulas(idx){\n  const fb=document.getElementById('fb-vlv');\n  if(!fb) return; // defensive: content not loaded yet\n  playClick();\n  if(valveStates.every((s,i)=>s===valveCorrects[i])){\n    fb.className='feedback ok'; fb.textContent='\u2713 V\u00e1lvulas configuradas! Press\u00e3o normalizada. M\u00f3dulo restaurado.';\n    playSuccess();\n    markDone(idx); setTimeout(()=>{if(currentMod===idx)goPanel();},2000);\n  } else {\n    fb.className='feedback err'; fb.textContent='\u2717 Configura\u00e7\u00e3o incorreta. Reveja regras com o Especialista. +30s.';\n    addStrike();\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  VIT\u00d3RIA\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction goEnd(){\n  clearInterval(timerInterval);\n  stopDrone();\n  playVictory();\n  const e=TOTAL_TIME-timeLeft;\n  document.getElementById('end-time').textContent=`Conclu\u00eddo em ${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')} | Erros: ${strikes}`;\n  show('s-end'); document.getElementById('timer-bar').classList.remove('active');\n  const c=document.getElementById('parts'); const cols=['#ffab00','#00e676','#4fc3f7','#ff6444','#ce93d8'];\n  let n=0; const iv=setInterval(()=>{\n    if(n++>100){clearInterval(iv);return;}\n    const p=document.createElement('div'); p.className='particle'; const sz=3+Math.random()*7;\n    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${Math.random()*20}%;background:${cols[n%5]};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()}s;`;\n    c.appendChild(p); setTimeout(()=>p.remove(),5000);\n  },50);\n}\n\nwindow.onload=()=>{show('s-intro');runIntro();};\n<\/script>\n</body>\n</html>\n";
    const htmlEspecialista = "<!DOCTYPE html>\n<html lang=\"pt-BR\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Manual do Especialista \u2014 Reator Entr\u00f3pico</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link href=\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --bg:#f7f4ef; --paper:#fdfbf8; --ink:#1a1a2e; --dim:#4a4a6a; --faint:#8888aa;\n  --red:#c0392b; --green:#1a7a3c; --blue:#0e4f8a; --amber:#8a5a00; --purple:#5c2d8a;\n  --border:#ccc8be; --border-d:#8a8070;\n  --hl:#fff3cd; --hl-b:#d4a017;\n  --danger:#fde8e8; --info:#e8f0fe;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;font-size:15px;line-height:1.75}\n\n/* STICKY HEADER */\n.manual-header{background:var(--ink);color:#9a9a8a;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;padding:9px 2rem;display:flex;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.35)}\n.manual-header .red{color:#e0564a}\n\n/* CAPA */\n.cover{background:radial-gradient(circle at 50% 35%, rgba(192,57,43,.10), transparent 65%), var(--ink);color:#f0ece4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;text-align:center;position:relative;overflow:hidden;box-shadow:inset 0 0 120px rgba(0,0,0,.5)}\n.cover::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,.03) 28px,rgba(255,255,255,.03) 29px),repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,.03) 28px,rgba(255,255,255,.03) 29px);pointer-events:none}\n.cover-badge{border:2px solid #c0392b;color:#c0392b;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;padding:6px 20px;text-transform:uppercase;margin-bottom:2rem}\n.cover-reactor{font-size:80px;margin-bottom:1.5rem}\n.cover-title{font-size:32px;font-weight:bold;letter-spacing:2px;line-height:1.2;margin-bottom:.5rem;color:#f0ece4}\n.cover-sub{font-size:14px;color:#9a9a8a;letter-spacing:3px;text-transform:uppercase;margin-bottom:3rem;font-family:'JetBrains Mono',monospace}\n.cover-div{width:80px;height:1px;background:#c0392b;margin:0 auto 2rem}\n.cover-warn{font-family:'JetBrains Mono',monospace;font-size:12px;color:#c0392b;letter-spacing:1px;line-height:1.9}\n.cover-foot{position:absolute;bottom:2rem;font-family:'JetBrains Mono',monospace;font-size:10px;color:#555;letter-spacing:2px}\n\n/* BODY */\n.manual-body{max-width:820px;margin:0 auto;padding:3rem 2rem}\n\n/* SECTIONS */\n.section{margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}\n.section:last-child{border-bottom:none}\n.section-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:2px solid var(--ink)}\n.section-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red);letter-spacing:2px;flex-shrink:0}\n.section-title{font-size:20px;font-weight:bold;letter-spacing:.5px}\n.section-mod{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple);letter-spacing:2px;margin-left:auto;flex-shrink:0}\n\np{margin-bottom:.75rem;color:var(--ink)}\np:last-child{margin-bottom:0}\n\n/* CALLOUTS */\n.callout{border-left:4px solid var(--hl-b);background:var(--hl);padding:1rem 1.25rem;margin:1.25rem 0;border-radius:0 5px 5px 0;box-shadow:0 3px 10px rgba(0,0,0,.07)}\n.callout.danger{border-color:var(--red);background:var(--danger)}\n.callout.info{border-color:var(--blue);background:var(--info)}\n.callout.green{border-color:var(--green);background:rgba(26,122,60,.06)}\n.callout-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;margin-bottom:.5rem}\n.callout.danger .callout-title{color:var(--red)}\n.callout.info .callout-title{color:var(--blue)}\n.callout.green .callout-title{color:var(--green)}\n.callout p{margin-bottom:.5rem}.callout p:last-child{margin-bottom:0}\n\n/* TABLES */\ntable{width:100%;border-collapse:collapse;margin:1.25rem 0;font-size:13px;box-shadow:0 3px 12px rgba(0,0,0,.06);border-radius:3px;overflow:hidden}\nth{background:var(--ink);color:#f0ece4;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:8px 12px;text-align:left;font-weight:normal}\ntd{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}\ntr:nth-child(even) td{background:rgba(0,0,0,.025)}\ntr:last-child td{border-bottom:none}\n.td-code{font-family:'JetBrains Mono',monospace;color:var(--purple);font-size:12px}\n.td-ok{color:var(--green);font-weight:bold}\n.td-bad{color:var(--red);font-weight:bold}\n.td-hidden{color:var(--amber);font-weight:bold}\n\n/* RULES LIST */\n.rules-list{list-style:none;margin:1rem 0}\n.rules-list li{display:flex;gap:1rem;margin-bottom:.75rem;padding:.75rem;background:var(--paper);border:1px solid var(--border);border-radius:4px}\n.rule-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red);flex-shrink:0;padding-top:2px}\n.rule-text{color:var(--ink);line-height:1.6}\n\n/* FORMULA */\n.formula-block{background:var(--ink);color:#f0ece4;font-family:'JetBrains Mono',monospace;font-size:15px;padding:1.25rem 1.5rem;border-radius:5px;margin:1.25rem 0;text-align:center;letter-spacing:1px;box-shadow:0 4px 16px rgba(0,0,0,.18)}\n.formula-label{font-size:10px;color:#9a9a8a;letter-spacing:2px;margin-bottom:6px}\n\n/* TREE */\n.tree{background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:1.25rem;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;margin:1rem 0}\n.tree .tq{color:var(--blue);font-weight:bold}\n.tree .ta{color:var(--green)}\n.tree .tn{color:var(--red)}\n.tree .ti{margin-left:1.5rem}\n.tree .ti2{margin-left:3rem}\n\n/* PROCESS ORDER */\n.proc-order{counter-reset:proc;list-style:none;margin:1rem 0}\n.proc-order li{counter-increment:proc;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;padding:10px 12px;background:var(--paper);border:1px solid var(--border);border-radius:4px}\n.proc-order li::before{content:counter(proc);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red);background:rgba(192,57,43,.08);border:1px solid var(--red);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}\n\n/* SEQ BOX */\n.seq-box{display:flex;gap:8px;flex-wrap:wrap;margin:1rem 0}\n.seq-cell-m{width:48px;height:48px;background:var(--ink);color:#f0ece4;font-family:'JetBrains Mono',monospace;font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--border-d)}\n\n/* VALVE GRID */\n.valve-grid-m{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:1rem 0}\n.valve-cell{border:1px solid var(--border);border-radius:4px;padding:.75rem;text-align:center}\n.valve-cell .vc-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--purple);margin-bottom:4px}\n.valve-cell .vc-name{font-size:12px;color:var(--ink);margin-bottom:4px}\n.valve-cell .vc-rule{font-size:11px;color:var(--dim);font-style:italic;margin-bottom:6px}\n.valve-cell .vc-state{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:bold;letter-spacing:1px}\n.vc-open{background:rgba(26,122,60,.06);border-color:var(--green)}.vc-open .vc-state{color:var(--green)}\n.vc-closed{background:rgba(192,57,43,.05);border-color:var(--red)}.vc-closed .vc-state{color:var(--red)}\n\n/* CICLO MODELS */\n.model-table{width:100%;border-collapse:collapse;margin:.75rem 0;font-size:12px}\n.model-table th{background:var(--ink);color:#f0ece4;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 10px;font-weight:normal}\n.model-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}\n.model-table tr:nth-child(even) td{background:rgba(0,0,0,.02)}\n.model-table tr:last-child td{border-bottom:none}\n.model-badge{display:inline-block;background:rgba(92,45,138,.1);border:1px solid var(--purple);color:var(--purple);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;padding:3px 12px;border-radius:3px;margin-bottom:.75rem}\n\n/* HESS TABLE */\n.rxn-table{width:100%;border-collapse:collapse;margin:.75rem 0;font-size:13px}\n.rxn-table th{background:var(--ink);color:#f0ece4;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:7px 12px;font-weight:normal}\n.rxn-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}\n.rxn-table tr:last-child td{border-bottom:none}\n.rxn-table tr:nth-child(even) td{background:rgba(0,0,0,.025)}\n\n/* PAGE BREAK */\n.page-break{border-top:2px dashed var(--border-d);margin:3rem 0;padding-top:2rem}\n.page-break-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint);letter-spacing:2px;text-align:center;margin-bottom:2rem}\n\n/* TOC */\n.toc{margin:1.5rem 0}\n.toc-item{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px dotted var(--border);font-size:13px}\n.toc-item:last-child{border-bottom:none}\n.toc-mod{font-family:'JetBrains Mono',monospace;color:var(--purple);font-size:11px}\n\n@media print{.page-break{page-break-before:always}.cover{min-height:auto;padding:4cm 2cm}body{font-size:12px}}\n</style>\n</head>\n<body>\n\n<div class=\"manual-header\">\n  <span class=\"red\">\u26a0 MANUAL DO ESPECIALISTA</span>\n  <span>REATOR ENTR\u00d3PICO \u00b7 N\u00cdVEL RESTRITO</span>\n  <span class=\"red\">N\u00c3O MOSTRE AO OPERADOR</span>\n</div>\n\n<!-- CAPA -->\n<div class=\"cover\">\n  <div class=\"cover-badge\">\u26a0 N\u00edvel de Acesso: Especialista</div>\n  <div class=\"cover-reactor\">\u269b\ufe0f</div>\n  <div class=\"cover-title\">MANUAL DO<br>ESPECIALISTA</div>\n  <div class=\"cover-sub\">Reator Entr\u00f3pico \u00b7 Protocolo de Emerg\u00eancia</div>\n  <div class=\"cover-div\"></div>\n  <div class=\"cover-warn\">\n    N\u00c3O MOSTRE ESTE DOCUMENTO AO OPERADOR<br>\n    COMUNIQUEM-SE APENAS POR VOZ<br>\n    CADA ERRO: \u221230 SEGUNDOS E +1 ERRO<br>\n    3 ERROS = COLAPSO TOTAL\n  </div>\n  <div class=\"cover-foot\">ENTROPIA EM A\u00c7\u00c3O \u00b7 UFAL \u00b7 TERMODIN\u00c2MICA \u00b7 USO RESTRITO</div>\n</div>\n\n<div class=\"manual-body\">\n\n<!-- 00: COMO USAR -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">00</span>\n    <span class=\"section-title\">Como Usar Este Manual</span>\n  </div>\n  <div class=\"callout danger\">\n    <div class=\"callout-title\">\u26a0 Regra Fundamental</div>\n    <p>Voc\u00ea possui o manual. O Operador possui o painel. <strong>Nenhum dos dois pode ver o que o outro v\u00ea.</strong> Comuniquem-se apenas por voz. O Operador descreve \u2014 voc\u00ea interpreta e instrui.</p>\n  </div>\n  <div class=\"callout info\">\n    <div class=\"callout-title\">\ud83d\udccb Fluxo de cada m\u00f3dulo</div>\n    <p><strong>1.</strong> Operador abre um m\u00f3dulo e l\u00ea os dados vis\u00edveis (IDs, valores, modelo).</p>\n    <p><strong>2.</strong> Especialista localiza o m\u00f3dulo neste manual, interpreta as regras e fornece a resposta.</p>\n    <p><strong>3.</strong> Operador executa e confirma. Erro \u2192 ambos voltam ao passo 2.</p>\n  </div>\n  <p>O <strong>n\u00famero de s\u00e9rie</strong> (ex: <em>ABK-417</em>) \u00e9 exibido no canto superior direito. Pe\u00e7a ao Operador antes de come\u00e7ar \u2014 v\u00e1rios m\u00f3dulos dependem dele.</p>\n  <p>O <strong>modelo do reator</strong> (ALFA, BETA, GAMA ou DELTA) aparece no MOD-E e MOD-G. Pe\u00e7a quando abrirem esses m\u00f3dulos.</p>\n  <div class=\"callout danger\">\n    <div class=\"callout-title\">\u23f1 Penalidades</div>\n    <p>Cada erro: <strong>\u221230 segundos + 1 marcador</strong>. Com 3 marcadores, o reator explode \u2014 independentemente do tempo.</p>\n  </div>\n  <div class=\"toc\">\n    <div class=\"toc-item\"><span>M\u00f3dulo de Calor \u2014 valor oculto</span><span class=\"toc-mod\">MOD-A</span></div>\n    <div class=\"toc-item\"><span>M\u00f3dulo de Temperatura \u2014 c\u00e1lculo pelas f\u00f3rmulas</span><span class=\"toc-mod\">MOD-B</span></div>\n    <div class=\"toc-item\"><span>Primeira Lei \u2014 Q oculto via dados de rea\u00e7\u00e3o</span><span class=\"toc-mod\">MOD-C</span></div>\n    <div class=\"toc-item\"><span>Entropia \u2014 ordena\u00e7\u00e3o por \u0394S</span><span class=\"toc-mod\">MOD-D</span></div>\n    <div class=\"toc-item\"><span>Ciclo Termodin\u00e2mico \u2014 tabela por modelo</span><span class=\"toc-mod\">MOD-E</span></div>\n    <div class=\"toc-item\"><span>C\u00f3digo de Igni\u00e7\u00e3o \u2014 regras do serial</span><span class=\"toc-mod\">MOD-F</span></div>\n    <div class=\"toc-item\"><span>Sistema de V\u00e1lvulas \u2014 regras combinadas</span><span class=\"toc-mod\">MOD-G</span></div>\n  </div>\n</div>\n\n<!-- MOD-A: CALOR -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">01</span>\n    <span class=\"section-title\">\ud83d\udd25 M\u00f3dulo de Calor</span>\n    <span class=\"section-mod\">MOD-A</span>\n  </div>\n  <p>O Operador ver\u00e1 <strong>dois reservat\u00f3rios</strong>: um tem a temperatura vis\u00edvel, o outro exibe <strong>\"???\"</strong>. Voc\u00ea tem a temperatura oculta nesta tabela. Ap\u00f3s revelar o valor, instrua a dire\u00e7\u00e3o do fluxo.</p>\n  <div class=\"callout info\">\n    <div class=\"callout-title\">\ud83d\udce1 Pergunte ao Operador</div>\n    <p>Qual \u00e9 o ID vis\u00edvel e sua temperatura? Qual \u00e9 o ID oculto (exibido com \"???\")?</p>\n  </div>\n\n  <p><strong>Tabela de temperaturas ocultas \u2014 consulte pelo ID:</strong></p>\n  <table>\n    <tr><th>ID</th><th>Nome</th><th>Temperatura oculta</th><th>Par vis\u00edvel</th></tr>\n    <tr><td class=\"td-code\">RES-01</td><td>C\u00c2MARA ALFA</td><td class=\"td-hidden\">600 K</td><td>RES-02 (300 K)</td></tr>\n    <tr><td class=\"td-code\">RES-02</td><td>DISSIPADOR BETA</td><td class=\"td-hidden\">300 K</td><td>RES-01 (600 K)</td></tr>\n    <tr><td class=\"td-code\">RES-03</td><td>N\u00daCLEO PRIME</td><td class=\"td-hidden\">850 K</td><td>RES-04 (420 K)</td></tr>\n    <tr><td class=\"td-code\">RES-04</td><td>C\u00c2MARA SUL</td><td class=\"td-hidden\">420 K</td><td>RES-03 (850 K)</td></tr>\n    <tr><td class=\"td-code\">RES-05</td><td>C\u00c2MARA GELO</td><td class=\"td-hidden\">200 K</td><td>RES-06 (750 K)</td></tr>\n    <tr><td class=\"td-code\">RES-06</td><td>N\u00daCLEO GAMA</td><td class=\"td-hidden\">750 K</td><td>RES-05 (200 K)</td></tr>\n    <tr><td class=\"td-code\">RES-07</td><td>DISSIPADOR D</td><td class=\"td-hidden\">310 K</td><td>RES-08 (680 K)</td></tr>\n    <tr><td class=\"td-code\">RES-08</td><td>C\u00c2MARA QUENTE</td><td class=\"td-hidden\">680 K</td><td>RES-07 (310 K)</td></tr>\n    <tr><td class=\"td-code\">RES-09</td><td>C\u00c2MARA SUL</td><td class=\"td-hidden\">450 K</td><td>RES-10 (450 K)</td></tr>\n    <tr><td class=\"td-code\">RES-10</td><td>C\u00c2MARA NORTE</td><td class=\"td-hidden\">450 K</td><td>RES-09 (450 K)</td></tr>\n    <tr><td class=\"td-code\">RES-11</td><td>NUCLEO A1</td><td class=\"td-hidden\">540 K</td><td>RES-12 (540 K)</td></tr>\n    <tr><td class=\"td-code\">RES-12</td><td>NUCLEO A2</td><td class=\"td-hidden\">540 K</td><td>RES-11 (540 K)</td></tr>\n  </table>\n\n  <p>Com os dois valores conhecidos, aplique a regra:</p>\n  <div class=\"tree\">\n    <div class=\"tq\">SE temperatura ESQUERDA &gt; temperatura DIREITA:</div>\n    <div class=\"ti ta\">\u2192 Calor flui para a DIREITA. Diga: \"Aperte seta direita \u2192\"</div>\n    <div class=\"tq\">SE temperatura DIREITA &gt; temperatura ESQUERDA:</div>\n    <div class=\"ti tn\">\u2192 Calor flui para a ESQUERDA. Diga: \"Aperte seta esquerda \u2190\"</div>\n    <div class=\"tq\">SE as temperaturas forem IGUAIS:</div>\n    <div class=\"ti\" style=\"color:var(--amber);font-weight:bold\">\u2192 Sem fluxo. Diga: \"Aperte NULO\"</div>\n  </div>\n  <div class=\"callout green\">\n    <div class=\"callout-title\">\ud83d\udd2c 2\u00aa Lei da Termodin\u00e2mica</div>\n    <p>Calor flui <strong>espontaneamente</strong> do corpo de maior temperatura para o de menor. O processo inverso requer trabalho externo \u2014 nunca ocorre sozinho.</p>\n  </div>\n</div>\n\n<!-- MOD-B: TEMPERATURA -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">02</span>\n    <span class=\"section-title\">\ud83c\udf21\ufe0f M\u00f3dulo de Temperatura</span>\n    <span class=\"section-mod\">MOD-B</span>\n  </div>\n  <p>O Operador ver\u00e1 <strong>6 sensores</strong>. Para cada um, ele informar\u00e1: ID, valor exibido e unidade alvo. Voc\u00ea n\u00e3o tem as respostas prontas \u2014 calcule com as f\u00f3rmulas abaixo e dite o resultado.</p>\n  <div class=\"callout info\">\n    <div class=\"callout-title\">\ud83d\udce1 Pergunte ao Operador</div>\n    <p>Para cada sensor: ID, valor exibido (ex: \"100 \u00b0C\") e unidade alvo (ex: \"K\").</p>\n  </div>\n  <div class=\"formula-block\">\n    <div class=\"formula-label\">F\u00d3RMULAS DE CONVERS\u00c3O</div>\n    T(K)  = T(\u00b0C) + 273<br>\n    T(\u00b0C) = T(K) \u2212 273<br>\n    T(\u00b0C) = (T(\u00b0F) \u2212 32) \u00d7 5/9<br>\n    T(\u00b0F) = T(\u00b0C) \u00d7 9/5 + 32<br>\n    T(K)  = T(\u00b0C) + 273 = [(T(\u00b0F)\u221232)\u00d75/9] + 273\n  </div>\n  <div class=\"callout\">\n    <div class=\"callout-title\">\ud83d\udca1 Aten\u00e7\u00e3o</div>\n    <p>O jogo aceita \u00b11 de margem. Se o Operador errar, h\u00e1 penalidade. Confirme o c\u00e1lculo antes de ditar. Para convers\u00f5es compostas (\u00b0F \u2192 K), converta em dois passos: \u00b0F \u2192 \u00b0C \u2192 K.</p>\n  </div>\n  <p><strong>Exemplos de c\u00e1lculo r\u00e1pido:</strong></p>\n  <table>\n    <tr><th>ID</th><th>Valor exibido</th><th>Unidade alvo</th><th>Resposta calculada</th></tr>\n    <tr><td class=\"td-code\">S-K1</td><td>100 \u00b0C</td><td>K</td><td class=\"td-ok\">373 K</td></tr>\n    <tr><td class=\"td-code\">S-K2</td><td>0 \u00b0C</td><td>K</td><td class=\"td-ok\">273 K</td></tr>\n    <tr><td class=\"td-code\">S-K3</td><td>25 \u00b0C</td><td>K</td><td class=\"td-ok\">298 K</td></tr>\n    <tr><td class=\"td-code\">S-K4</td><td>\u221240 \u00b0C</td><td>K</td><td class=\"td-ok\">233 K</td></tr>\n    <tr><td class=\"td-code\">S-K5</td><td>150 \u00b0C</td><td>K</td><td class=\"td-ok\">423 K</td></tr>\n    <tr><td class=\"td-code\">S-K6</td><td>\u2212100 \u00b0C</td><td>K</td><td class=\"td-ok\">173 K</td></tr>\n    <tr><td class=\"td-code\">S-C1</td><td>373 K</td><td>\u00b0C</td><td class=\"td-ok\">100 \u00b0C</td></tr>\n    <tr><td class=\"td-code\">S-C2</td><td>500 K</td><td>\u00b0C</td><td class=\"td-ok\">227 \u00b0C</td></tr>\n    <tr><td class=\"td-code\">S-C3</td><td>273 K</td><td>\u00b0C</td><td class=\"td-ok\">0 \u00b0C</td></tr>\n    <tr><td class=\"td-code\">S-C4</td><td>600 K</td><td>\u00b0C</td><td class=\"td-ok\">327 \u00b0C</td></tr>\n    <tr><td class=\"td-code\">S-F1</td><td>77 \u00b0F</td><td>\u00b0C</td><td class=\"td-ok\">25 \u00b0C</td></tr>\n    <tr><td class=\"td-code\">S-F2</td><td>212 \u00b0F</td><td>\u00b0C</td><td class=\"td-ok\">100 \u00b0C</td></tr>\n    <tr><td class=\"td-code\">S-F3</td><td>32 \u00b0F</td><td>\u00b0C</td><td class=\"td-ok\">0 \u00b0C</td></tr>\n    <tr><td class=\"td-code\">S-FK1</td><td>98.6 \u00b0F</td><td>K</td><td class=\"td-ok\">310 K</td></tr>\n    <tr><td class=\"td-code\">S-KF1</td><td>300 K</td><td>\u00b0F</td><td class=\"td-ok\">80 \u00b0F</td></tr>\n  </table>\n</div>\n\n<!-- MOD-C: PRIMEIRA LEI -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">03</span>\n    <span class=\"section-title\">\u2699\ufe0f Primeira Lei</span>\n    <span class=\"section-mod\">MOD-C</span>\n  </div>\n  <p>O Operador ver\u00e1 W (trabalho) e um <strong>ID de rea\u00e7\u00e3o</strong> (ex: RXN-01). O valor de Q (calor) est\u00e1 <strong>oculto</strong> no painel \u2014 apenas voc\u00ea tem na tabela abaixo. Calcule \u0394U e dite.</p>\n  <div class=\"callout info\">\n    <div class=\"callout-title\">\ud83d\udce1 Pergunte ao Operador</div>\n    <p>Qual \u00e9 o ID da rea\u00e7\u00e3o exibido no m\u00f3dulo? Qual \u00e9 o valor de W?</p>\n  </div>\n  <div class=\"formula-block\">\n    <div class=\"formula-label\">PRIMEIRA LEI DA TERMODIN\u00c2MICA</div>\n    \u0394U = Q \u2212 W\n  </div>\n  <p><strong>Tabela de dados de rea\u00e7\u00e3o \u2014 Q oculto:</strong></p>\n  <table class=\"rxn-table\">\n    <tr><th>ID Rea\u00e7\u00e3o</th><th>Calor Q (oculto no painel)</th><th>W vis\u00edvel</th></tr>\n    <tr><td class=\"td-code\">RXN-01</td><td class=\"td-hidden\">Q = 150 J</td><td>80 J</td></tr>\n    <tr><td class=\"td-code\">RXN-02</td><td class=\"td-hidden\">Q = 200 J</td><td>300 J</td></tr>\n    <tr><td class=\"td-code\">RXN-03</td><td class=\"td-hidden\">Q = 50 J</td><td>120 J</td></tr>\n    <tr><td class=\"td-code\">RXN-04</td><td class=\"td-hidden\">Q = 0 J</td><td>\u221250 J</td></tr>\n    <tr><td class=\"td-code\">RXN-05</td><td class=\"td-hidden\">Q = 350 J</td><td>200 J</td></tr>\n    <tr><td class=\"td-code\">RXN-06</td><td class=\"td-hidden\">Q = 240 J</td><td>90 J</td></tr>\n  </table>\n  <div class=\"callout green\">\n    <div class=\"callout-title\">\ud83d\udd2c Conceito</div>\n    <p>W negativo (ex: RXN-04) significa trabalho feito <em>sobre</em> o sistema, n\u00e3o pelo sistema. Nesse caso \u0394U = Q \u2212 (\u2212|W|) = Q + |W|, aumentando a energia interna.</p>\n  </div>\n  <div class=\"callout\">\n    <div class=\"callout-title\">\ud83d\udca1 Como ditar ao Operador</div>\n    <p>Diga: \"O valor de Q \u00e9 [X] J. Calcule [X] menos [W]. O slider deve ir para [\u0394U] J.\"</p>\n  </div>\n</div>\n\n<!-- MOD-D: ENTROPIA -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">04</span>\n    <span class=\"section-title\">\u267b\ufe0f Entropia</span>\n    <span class=\"section-mod\">MOD-D</span>\n  </div>\n  <p>O Operador ver\u00e1 5 processos em ordem aleat\u00f3ria, cada um com um ID (PROC-01 a PROC-05). Ele deve arrast\u00e1-los para a ordem correta (maior para menor \u0394S). Voc\u00ea tem a ordem fixa aqui.</p>\n  <div class=\"callout info\">\n    <div class=\"callout-title\">\ud83d\udce1 Pergunte ao Operador</div>\n    <p>Leia os IDs de cima para baixo. Assim voc\u00ea sabe o que est\u00e1 em cada posi\u00e7\u00e3o e pode guiar os movimentos necess\u00e1rios.</p>\n  </div>\n  <p><strong>Ordem correta \u2014 MAIOR para MENOR \u0394S:</strong></p>\n  <ol class=\"proc-order\">\n    <li><strong>PROC-01</strong> \u2014 Expans\u00e3o de g\u00e1s em v\u00e1cuo (irrevers\u00edvel)<br><span style=\"font-size:12px;color:var(--dim)\">Maior desordem: expans\u00e3o livre e irrevers\u00edvel, m\u00e1xima gera\u00e7\u00e3o de entropia.</span></li>\n    <li><strong>PROC-02</strong> \u2014 \u00c1gua evaporando (l\u00edquido \u2192 vapor)<br><span style=\"font-size:12px;color:var(--dim)\">Mudan\u00e7a de fase: dispers\u00e3o intensa de mol\u00e9culas para o estado gasoso.</span></li>\n    <li><strong>PROC-03</strong> \u2014 Gelo derretendo (s\u00f3lido \u2192 l\u00edquido)<br><span style=\"font-size:12px;color:var(--dim)\">Mudan\u00e7a de fase moderada: menos dispers\u00e3o que o vapor.</span></li>\n    <li><strong>PROC-04</strong> \u2014 Aquecimento lento de s\u00f3lido<br><span style=\"font-size:12px;color:var(--dim)\">Aumento gradual de vibra\u00e7\u00e3o \u2014 \u0394S moderado, sem mudan\u00e7a de fase.</span></li>\n    <li><strong>PROC-05</strong> \u2014 Resfriamento revers\u00edvel de metal<br><span style=\"font-size:12px;color:var(--dim)\">Processo quase-est\u00e1tico e revers\u00edvel \u2014 menor \u0394S poss\u00edvel.</span></li>\n  </ol>\n  <div class=\"callout green\">\n    <div class=\"callout-title\">\ud83d\udd2c Regra geral de entropia</div>\n    <p>Irrevers\u00edvel &gt; Mudan\u00e7a de fase (g\u00e1s) &gt; Mudan\u00e7a de fase (l\u00edquido) &gt; Aquecimento gradual &gt; Processo revers\u00edvel.</p>\n  </div>\n</div>\n\n<!-- MOD-E: CICLO -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">05</span>\n    <span class=\"section-title\">\ud83d\udd04 Ciclo Termodin\u00e2mico</span>\n    <span class=\"section-mod\">MOD-E</span>\n  </div>\n  <p>O Operador dir\u00e1 o <strong>Modelo do Reator</strong> (ALFA, BETA, GAMA ou DELTA) e os IDs dos 4 processos. Encontre o modelo na tabela abaixo e informe as caracter\u00edsticas de cada processo. Os dois devem discutir e concluir o tipo.</p>\n  <div class=\"callout info\">\n    <div class=\"callout-title\">\ud83d\udce1 Pergunte ao Operador</div>\n    <p>\"Qual \u00e9 o Modelo do Reator?\" (aparece em destaque roxo na tela)</p>\n    <p>Para cada processo: \"Qual \u00e9 o ID e qual vari\u00e1vel observada est\u00e1 exibida?\"</p>\n  </div>\n\n  <div class=\"model-badge\">MODELO: ALFA</div>\n  <table class=\"model-table\">\n    <tr><th>ID</th><th>Vari\u00e1vel observada (painel)</th><th>Tipo correto</th><th>Motivo</th></tr>\n    <tr><td class=\"td-code\">CIC-A1</td><td>T = constante, V \u2191</td><td class=\"td-ok\">Isot\u00e9rmico</td><td>Temperatura constante</td></tr>\n    <tr><td class=\"td-code\">CIC-A2</td><td>P = constante, V \u2193</td><td class=\"td-ok\">Isob\u00e1rico</td><td>Press\u00e3o constante</td></tr>\n    <tr><td class=\"td-code\">CIC-A3</td><td>V = constante, P \u2193</td><td class=\"td-ok\">Isoc\u00f3rico</td><td>Volume constante</td></tr>\n    <tr><td class=\"td-code\">CIC-A4</td><td>Q = 0, T \u2193</td><td class=\"td-ok\">Adiab\u00e1tico</td><td>Sem troca de calor</td></tr>\n  </table>\n\n  <div class=\"model-badge\">MODELO: BETA</div>\n  <table class=\"model-table\">\n    <tr><th>ID</th><th>Vari\u00e1vel observada (painel)</th><th>Tipo correto</th><th>Motivo</th></tr>\n    <tr><td class=\"td-code\">CIC-B1</td><td>Q = 0, V \u2191</td><td class=\"td-ok\">Adiab\u00e1tico</td><td>Sem troca de calor</td></tr>\n    <tr><td class=\"td-code\">CIC-B2</td><td>V = constante, P \u2191</td><td class=\"td-ok\">Isoc\u00f3rico</td><td>Volume constante</td></tr>\n    <tr><td class=\"td-code\">CIC-B3</td><td>P = constante, V \u2191</td><td class=\"td-ok\">Isob\u00e1rico</td><td>Press\u00e3o constante</td></tr>\n    <tr><td class=\"td-code\">CIC-B4</td><td>T = constante, V \u2193</td><td class=\"td-ok\">Isot\u00e9rmico</td><td>Temperatura constante</td></tr>\n  </table>\n\n  <div class=\"model-badge\">MODELO: GAMA</div>\n  <table class=\"model-table\">\n    <tr><th>ID</th><th>Vari\u00e1vel observada (painel)</th><th>Tipo correto</th><th>Motivo</th></tr>\n    <tr><td class=\"td-code\">CIC-G1</td><td>P = constante, T \u2191</td><td class=\"td-ok\">Isob\u00e1rico</td><td>Press\u00e3o constante</td></tr>\n    <tr><td class=\"td-code\">CIC-G2</td><td>T = constante, P \u2191</td><td class=\"td-ok\">Isot\u00e9rmico</td><td>Temperatura constante</td></tr>\n    <tr><td class=\"td-code\">CIC-G3</td><td>Q = 0, P \u2191</td><td class=\"td-ok\">Adiab\u00e1tico</td><td>Sem troca de calor</td></tr>\n    <tr><td class=\"td-code\">CIC-G4</td><td>V = constante, T \u2193</td><td class=\"td-ok\">Isoc\u00f3rico</td><td>Volume constante</td></tr>\n  </table>\n\n  <div class=\"model-badge\">MODELO: DELTA</div>\n  <table class=\"model-table\">\n    <tr><th>ID</th><th>Vari\u00e1vel observada (painel)</th><th>Tipo correto</th><th>Motivo</th></tr>\n    <tr><td class=\"td-code\">CIC-D1</td><td>V = constante, T \u2191</td><td class=\"td-ok\">Isoc\u00f3rico</td><td>Volume constante</td></tr>\n    <tr><td class=\"td-code\">CIC-D2</td><td>Q = 0, T \u2191</td><td class=\"td-ok\">Adiab\u00e1tico</td><td>Sem troca de calor</td></tr>\n    <tr><td class=\"td-code\">CIC-D3</td><td>T = constante, P \u2193</td><td class=\"td-ok\">Isot\u00e9rmico</td><td>Temperatura constante</td></tr>\n    <tr><td class=\"td-code\">CIC-D4</td><td>P = constante, V \u2193</td><td class=\"td-ok\">Isob\u00e1rico</td><td>Press\u00e3o constante</td></tr>\n  </table>\n\n  <div class=\"callout green\">\n    <div class=\"callout-title\">\ud83d\udd2c Guia de Processos</div>\n    <p><strong>Isot\u00e9rmico:</strong> T constante (\u0394T = 0, \u0394U = 0).</p>\n    <p><strong>Isob\u00e1rico:</strong> P constante \u2014 volume pode variar livremente.</p>\n    <p><strong>Isoc\u00f3rico:</strong> V constante \u2014 W = 0, toda varia\u00e7\u00e3o em calor.</p>\n    <p><strong>Adiab\u00e1tico:</strong> Q = 0 \u2014 sem troca t\u00e9rmica, toda energia vem de trabalho.</p>\n  </div>\n</div>\n\n<!-- MOD-F: C\u00d3DIGO -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">06</span>\n    <span class=\"section-title\">\ud83d\udd10 C\u00f3digo de Igni\u00e7\u00e3o</span>\n    <span class=\"section-mod\">MOD-F</span>\n  </div>\n  <p>O Operador informar\u00e1: <strong>N\u00famero de S\u00e9rie</strong>, <strong>Soma dos d\u00edgitos</strong> e se <strong>cont\u00e9m vogal</strong>. Com esses dados, derive o c\u00f3digo de 5 posi\u00e7\u00f5es aplicando as regras em ordem.</p>\n  <div class=\"callout info\">\n    <div class=\"callout-title\">\ud83d\udce1 Pergunte ao Operador</div>\n    <p>S\u00e9rie? | Soma dos d\u00edgitos num\u00e9ricos? | Cont\u00e9m vogal (A,E,I,O,U)?</p>\n  </div>\n  <ul class=\"rules-list\">\n    <li><span class=\"rule-num\">P1</span><span class=\"rule-text\"><strong>Posi\u00e7\u00e3o 1:</strong> Soma dos d\u00edgitos PAR \u2192 <strong>Q</strong> \u00b7 \u00cdMPAR \u2192 <strong>T</strong></span></li>\n    <li><span class=\"rule-num\">P2</span><span class=\"rule-text\"><strong>Posi\u00e7\u00e3o 2:</strong> Sempre \u2192 <strong>S</strong></span></li>\n    <li><span class=\"rule-num\">P3</span><span class=\"rule-text\"><strong>Posi\u00e7\u00e3o 3:</strong> Serial tem VOGAL \u2192 <strong>U</strong> \u00b7 SEM vogal \u2192 <strong>W</strong></span></li>\n    <li><span class=\"rule-num\">P4</span><span class=\"rule-text\"><strong>Posi\u00e7\u00e3o 4:</strong> Soma &gt; 12 \u2192 <strong>H</strong> \u00b7 Soma \u2264 12 \u2192 <strong>\u0394</strong></span></li>\n    <li><span class=\"rule-num\">P5</span><span class=\"rule-text\"><strong>Posi\u00e7\u00e3o 5:</strong> Sempre \u2192 <strong>R</strong></span></li>\n  </ul>\n  <div class=\"callout\">\n    <div class=\"callout-title\">\ud83d\udcdd Exemplo \u2014 Serial: ABK-417</div>\n    <p>D\u00edgitos: 4+1+7 = <strong>12</strong> (par) | Vogal: <strong>A</strong> \u2192 SIM</p>\n    <p>P1: 12 par \u2192 <strong>Q</strong> \u00b7 P2: \u2192 <strong>S</strong> \u00b7 P3: tem vogal \u2192 <strong>U</strong> \u00b7 P4: 12 \u2264 12 \u2192 <strong>\u0394</strong> \u00b7 P5: \u2192 <strong>R</strong></p>\n    <p>C\u00f3digo: <strong>Q \u2014 S \u2014 U \u2014 \u0394 \u2014 R</strong></p>\n  </div>\n  <div class=\"seq-box\">\n    <div class=\"seq-cell-m\">Q</div><div class=\"seq-cell-m\">S</div>\n    <div class=\"seq-cell-m\">U</div><div class=\"seq-cell-m\">\u0394</div><div class=\"seq-cell-m\">R</div>\n  </div>\n  <p style=\"font-size:12px;color:var(--faint);font-style:italic\">Exemplo apenas \u2014 o c\u00f3digo real depende do serial da sua partida.</p>\n</div>\n\n<!-- MOD-G: V\u00c1LVULAS -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">07</span>\n    <span class=\"section-title\">\ud83d\udeb0 Sistema de V\u00e1lvulas</span>\n    <span class=\"section-mod\">MOD-G</span>\n  </div>\n  <p>O Operador informar\u00e1: <strong>Modelo do Reator</strong>, <strong>Soma dos d\u00edgitos</strong> e se <strong>cont\u00e9m vogal</strong>. As 6 v\u00e1lvulas t\u00eam estados corretos derivados dessas informa\u00e7\u00f5es. O Operador dir\u00e1 o estado atual de cada uma e voc\u00ea diz quais mudar.</p>\n  <div class=\"callout info\">\n    <div class=\"callout-title\">\ud83d\udce1 Pergunte ao Operador</div>\n    <p>Modelo? | Soma dos d\u00edgitos? | Cont\u00e9m vogal? | Estado atual de VLV-01 a VLV-06 (ABERTA/FECHADA)?</p>\n  </div>\n  <p><strong>Regras de estado correto para cada v\u00e1lvula:</strong></p>\n  <table>\n    <tr><th>ID</th><th>Nome</th><th>Regra</th><th>Quando ABERTA</th><th>Quando FECHADA</th></tr>\n    <tr><td class=\"td-code\">VLV-01</td><td>Entrada Alfa</td><td>Soma par/\u00edmpar</td><td class=\"td-ok\">Soma PAR</td><td class=\"td-bad\">Soma \u00cdMPAR</td></tr>\n    <tr><td class=\"td-code\">VLV-02</td><td>Bypass Beta</td><td>Vogal S/N</td><td class=\"td-ok\">Serial TEM vogal</td><td class=\"td-bad\">Serial SEM vogal</td></tr>\n    <tr><td class=\"td-code\">VLV-03</td><td>Sa\u00edda Gama</td><td>Soma vs 12</td><td class=\"td-ok\">Soma &gt; 12</td><td class=\"td-bad\">Soma \u2264 12</td></tr>\n    <tr><td class=\"td-code\">VLV-04</td><td>Press\u00e3o Delta</td><td>Modelo do reator</td><td class=\"td-ok\">Modelo ALFA ou BETA</td><td class=\"td-bad\">Modelo GAMA ou DELTA</td></tr>\n    <tr><td class=\"td-code\">VLV-05</td><td>C\u00e2mara \u00c9psilon</td><td>Soma par/\u00edmpar (inverso)</td><td class=\"td-ok\">Soma \u00cdMPAR</td><td class=\"td-bad\">Soma PAR</td></tr>\n    <tr><td class=\"td-code\">VLV-06</td><td>Retorno Zeta</td><td>Vogal S/N (inverso)</td><td class=\"td-ok\">Serial SEM vogal</td><td class=\"td-bad\">Serial TEM vogal</td></tr>\n  </table>\n  <div class=\"callout\">\n    <div class=\"callout-title\">\ud83d\udca1 Como usar a tabela</div>\n    <p>Derive o estado correto de cada v\u00e1lvula pela regra, depois compare com o estado atual que o Operador informou. Para cada discrep\u00e2ncia: \"Clique em VLV-0X para mudar de ABERTA para FECHADA\" (ou o contr\u00e1rio).</p>\n  </div>\n  <div class=\"callout danger\">\n    <div class=\"callout-title\">\u26a0 Exemplo r\u00e1pido</div>\n    <p>Modelo ALFA | Soma = 12 (par) | Sem vogal:</p>\n    <p>VLV-01: par \u2192 ABERTA \u00b7 VLV-02: sem vogal \u2192 FECHADA \u00b7 VLV-03: 12 \u2264 12 \u2192 FECHADA<br>VLV-04: ALFA \u2192 ABERTA \u00b7 VLV-05: par (inv) \u2192 FECHADA \u00b7 VLV-06: sem vogal (inv) \u2192 ABERTA</p>\n  </div>\n</div>\n\n<!-- REFER\u00caNCIA R\u00c1PIDA -->\n<div class=\"page-break\"></div>\n<div class=\"page-break-label\">\u2702 RECORTE \u2014 REFER\u00caNCIA R\u00c1PIDA DO ESPECIALISTA</div>\n\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">REF</span>\n    <span class=\"section-title\">Refer\u00eancia R\u00e1pida</span>\n  </div>\n  <table>\n    <tr><th>M\u00f3dulo</th><th>Pe\u00e7a ao Operador</th><th>O que fazer</th></tr>\n    <tr><td>\ud83d\udd25 MOD-A</td><td>ID vis\u00edvel + ID oculto</td><td>Consulte tabela \u2192 revele temperatura \u2192 compare \u2192 dite dire\u00e7\u00e3o</td></tr>\n    <tr><td>\ud83c\udf21\ufe0f MOD-B</td><td>ID + valor + unidade alvo (cada sensor)</td><td>Calcule com as f\u00f3rmulas \u2192 dite o resultado</td></tr>\n    <tr><td>\u2699\ufe0f MOD-C</td><td>ID da rea\u00e7\u00e3o + W vis\u00edvel</td><td>Consulte tabela de Q \u2192 calcule \u0394U = Q \u2212 W \u2192 dite para o slider</td></tr>\n    <tr><td>\u267b\ufe0f MOD-D</td><td>IDs dos processos por posi\u00e7\u00e3o</td><td>Guie para ordem: PROC-01 \u2192 02 \u2192 03 \u2192 04 \u2192 05</td></tr>\n    <tr><td>\ud83d\udd04 MOD-E</td><td>Modelo do reator + IDs dos processos</td><td>Consulte a tabela do modelo \u2192 dite o tipo de cada processo</td></tr>\n    <tr><td>\ud83d\udd10 MOD-F</td><td>Serial + soma + vogal S/N</td><td>Aplique as 5 regras em ordem \u2192 dite os 5 s\u00edmbolos</td></tr>\n    <tr><td>\ud83d\udeb0 MOD-G</td><td>Modelo + soma + vogal + estado atual de cada VLV</td><td>Derive estado correto pelas regras \u2192 dite quais mudar</td></tr>\n  </table>\n  <div class=\"callout danger\" style=\"margin-top:1.5rem\">\n    <div class=\"callout-title\">\u26a0 Lembre-se sempre</div>\n    <p>Cada erro: <strong>\u221230 segundos + 1 marcador</strong>. Com 3 marcadores = colapso imediato. Confirme tudo antes de ditar. Se tiver d\u00favida, pe\u00e7a ao Operador para repetir os dados.</p>\n  </div>\n</div>\n\n</div>\n</body>\n</html>\n";

    function iniciar(papel) {
      let content = papel === 'operador' ? htmlOperador : htmlEspecialista;
      if (papel === 'especialista') {
        content = content
          .replace('Expansão de gás em vácuo (irreversível)<br>', 'Expansão de gás em vácuo<br>(irreversível)<br>')
          .replace('Água evaporando (líquido → vapor)<br>', 'Água evaporando<br>(líquido → vapor)<br>')
          .replace('Gelo derretendo (sólido → líquido)<br>', 'Gelo derretendo<br>(sólido → líquido)<br>');
      }
      document.open();
      document.write(content.replace('</head>', responsiveStyles + '</head>'));
      document.close();
    }

    function fechar() {
      window.close();
      document.getElementById('menu').innerHTML = `
        <span class="menu-reactor-icon" style="filter:drop-shadow(0 0 14px rgba(255,61,61,.4))">⚠️</span>

    }
