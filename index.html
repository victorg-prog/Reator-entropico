<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reator Entrópico - Menu Principal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070a10;
    --text: #c8d8e8;
    --accent: #4fc3f7;
    --danger: #ff3d3d;
    --panel: #0d1420;
    --panel3: #0a0f18;
    --border: #1e2d45;
    --font-ui: 'JetBrains Mono', monospace;
    --font-display: 'Orbitron', sans-serif;
    --shadow-deep: 0 8px 40px rgba(0,0,0,.6);
    --glow-accent: 0 0 18px rgba(79,195,247,.35);
    --glow-danger: 0 0 16px rgba(255,61,61,.4);
  }
  * { box-sizing: border-box; }
  body {
    background:
      radial-gradient(circle at 50% 30%, rgba(79,195,247,.05), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    text-align: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  .menu-container {
    background: linear-gradient(160deg, var(--panel), var(--panel3));
    padding: 44px 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-deep);
    max-width: 500px;
    width: 90%;
    z-index: 10;
    animation: menu-in .5s ease;
  }
  @keyframes menu-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .menu-reactor-icon{font-size:42px;margin-bottom:.5rem;display:block;filter:drop-shadow(0 0 14px rgba(79,195,247,.4))}
  h1 {
    font-family: var(--font-display);
    color: var(--accent);
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: var(--glow-accent);
  }
  p {
    margin-bottom: 30px;
    color: #5a7a99;
    font-size: .85rem;
    letter-spacing: .5px;
    line-height: 1.7;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin-bottom: 16px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 5px;
    font-family: var(--font-ui);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn:hover {
    background: rgba(79,195,247,.1);
    box-shadow: var(--glow-accent);
    transform: translateY(-1px);
  }
  .btn-fechar {
    border-color: var(--danger);
    color: var(--danger);
    margin-top: 30px;
  }
  .btn-fechar:hover {
    background: rgba(255,61,61,.1);
    color: var(--text);
    box-shadow: var(--glow-danger);
  }
  .menu-foot{margin-top:1.5rem;font-size:.65rem;color:#3d5a78;letter-spacing:2px;border-top:1px solid var(--border);padding-top:1rem;}

  @media (max-width: 600px) {
    body { justify-content: flex-start; padding: 16px; }
    .menu-container { width: 100%; margin: auto 0; padding: 32px 22px; }
    h1 { font-size: clamp(1.25rem, 7vw, 1.7rem); letter-spacing: 2px; }
    p { margin-bottom: 24px; }
    .btn { padding: 14px 10px; font-size: .86rem; }
    .btn-fechar { margin-top: 22px; }
    .menu-foot { line-height: 1.7; }
  }

  @media (max-height: 620px) {
    body { justify-content: flex-start; padding-block: 12px; }
    .menu-container { margin: auto 0; padding-block: 24px; }
    .menu-reactor-icon { font-size: 34px; }
    p { margin-bottom: 18px; }
    .btn { margin-bottom: 10px; padding-block: 11px; }
    .btn-fechar { margin-top: 14px; }
    .menu-foot { margin-top: 1rem; }
  }
</style>
</head>
<body>
  <div class="menu-container" id="menu">
    <span class="menu-reactor-icon">⚛️</span>
    <h1>Reator Entrópico</h1>
    <p>SISTEMA DE INICIALIZAÇÃO<br>Selecione seu posto de trabalho:</p>

    <button class="btn" onclick="iniciar('operador')">💻 Iniciar como Operador</button>
    <button class="btn" onclick="iniciar('especialista')">📘 Iniciar como Especialista (Manual)</button>
    <button class="btn btn-fechar" onclick="fechar()">❌ Fechar Sistema</button>

    <div class="menu-foot">ENTROPIA EM AÇÃO · UFAL · TERMODINÂMICA · 2026</div>
  </div>

  <script>
    const htmlOperador = "<!DOCTYPE html>\n<html lang=\"pt-BR\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Reator Entr\u00f3pico \u2014 OPERADOR</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link href=\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --bg:#070a10; --panel:#0d1420; --panel2:#111c2c; --panel3:#0a0f18;\n  --border:#1e2d45; --border2:#2a3f5c; --border-glow:#3a5a82;\n  --green:#00e676; --green-dim:#00c853;\n  --red:#ff3d3d; --red-deep:#c41818; --amber:#ffab00; --blue:#4fc3f7; --purple:#ce93d8;\n  --text:#c8d8e8; --text-dim:#5a7a99; --text-bright:#eef6ff;\n  --ok-bg:rgba(0,230,118,.08); --err-bg:rgba(255,61,61,.08);\n  --font-ui:'JetBrains Mono',monospace; --font-display:'Orbitron',sans-serif;\n  --shadow-panel:0 4px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.03);\n  --shadow-deep:0 8px 40px rgba(0,0,0,.6);\n  --glow-green:0 0 16px rgba(0,230,118,.35);\n  --glow-red:0 0 16px rgba(255,61,61,.4);\n  --glow-amber:0 0 14px rgba(255,171,0,.35);\n}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;overflow-x:hidden;position:relative}\nbody::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:9999}\n\n/* \u2550\u2550\u2550 DANGER STATE SYSTEM \u2550\u2550\u2550\n   body.danger-0 = est\u00e1vel | danger-1 = alerta | danger-2 = cr\u00edtico | danger-3 = colapso iminente */\n.danger-vignette{position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:0;transition:opacity 1.2s ease;}\n@keyframes vignette-pulse-1{0%,100%{box-shadow:inset 0 0 100px 20px rgba(255,61,61,.06)}50%{box-shadow:inset 0 0 130px 30px rgba(255,61,61,.13)}}\n@keyframes vignette-pulse-2{0%,100%{box-shadow:inset 0 0 110px 30px rgba(255,61,61,.14)}50%{box-shadow:inset 0 0 150px 45px rgba(255,61,61,.26)}}\n@keyframes vignette-pulse-3{0%,100%{box-shadow:inset 0 0 130px 45px rgba(255,61,61,.24)}50%{box-shadow:inset 0 0 180px 65px rgba(255,61,61,.42)}}\nbody.danger-1 .danger-vignette{opacity:1;animation:vignette-pulse-1 2.2s ease-in-out infinite;}\nbody.danger-2 .danger-vignette{opacity:1;animation:vignette-pulse-2 1.3s ease-in-out infinite;}\nbody.danger-3 .danger-vignette{opacity:1;animation:vignette-pulse-3 .7s ease-in-out infinite;}\n\n@keyframes screen-shake-2{0%,100%{transform:translate(0,0)}25%{transform:translate(-1px,1px)}50%{transform:translate(1px,-1px)}75%{transform:translate(-1px,-1px)}}\n@keyframes screen-shake-3{0%,100%{transform:translate(0,0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-2px)}60%{transform:translate(-1px,2px)}80%{transform:translate(2px,1px)}}\n@keyframes glitch-flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.3}94%{opacity:1}97%{opacity:.5}98%{opacity:1}}\nbody.danger-2 .screen.active{animation:screen-shake-2 .4s linear infinite, glitch-flicker 3.2s steps(1) infinite;}\nbody.danger-3 .screen.active{animation:screen-shake-3 .22s linear infinite, glitch-flicker 1.8s steps(1) infinite;}\n\n\n/* SCREENS */\n.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:2rem}\n.screen.active{display:flex}\n\n/* INTRO */\n.intro-terminal{background:var(--panel);border:1px solid var(--border2);border-radius:6px;width:100%;max-width:640px;overflow:hidden;box-shadow:var(--shadow-deep)}\n.terminal-bar{background:var(--panel2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim)}\n.dot-r{width:10px;height:10px;border-radius:50%;background:#ff5f56}\n.dot-y{width:10px;height:10px;border-radius:50%;background:#ffbd2e}\n.dot-g{width:10px;height:10px;border-radius:50%;background:#27c93f}\n.terminal-body{padding:1.5rem;min-height:340px}\n.t-line{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap}\n.t-line.prompt{color:var(--green)}.t-line.warn{color:var(--amber)}\n.t-line.dim{color:var(--text-dim)}.t-line.title{color:var(--blue);font-size:15px;font-weight:bold}\n.t-line.purp{color:var(--purple)}\n.cursor{display:inline-block;width:8px;height:14px;background:var(--green);animation:blink-cur 1s infinite;vertical-align:middle;margin-left:2px}\n@keyframes blink-cur{0%,49%{opacity:1}50%,100%{opacity:0}}\n\n/* TIMER BAR */\n.timer-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(180deg, var(--panel2), var(--panel));border-bottom:1px solid var(--border2);box-shadow:var(--shadow-panel);display:none;align-items:center;justify-content:space-between;padding:10px 24px;z-index:1000}\n.timer-bar.active{display:flex}\n.timer-display{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:4px;color:var(--green);transition:color .3s;text-shadow:var(--glow-green)}\n.timer-display.warn{color:var(--amber);text-shadow:var(--glow-amber);animation:pulse-t .5s infinite}\n.timer-display.danger{color:var(--red);text-shadow:var(--glow-red);animation:pulse-t .3s infinite}\n@keyframes pulse-t{0%,100%{opacity:1}50%{opacity:.5}}\n.strikes-wrap{display:flex;gap:8px;align-items:center}\n.strike-led{width:14px;height:14px;border-radius:50%;border:1px solid var(--border2);background:transparent;transition:all .3s}\n.strike-led.active{background:var(--red);box-shadow:0 0 8px var(--red);border-color:var(--red)}\n\n/* BUTTONS */\n.btn-primary{background:transparent;border:1px solid var(--green);border-radius:4px;color:var(--green);font-family:var(--font-ui);font-weight:600;font-size:13px;letter-spacing:2px;padding:12px 32px;cursor:pointer;text-transform:uppercase;transition:all .2s;margin-top:1.5rem}\n.btn-primary:hover{background:rgba(0,230,118,.1);box-shadow:var(--glow-green);transform:translateY(-1px)}\n.btn-primary:disabled{border-color:var(--text-dim);color:var(--text-dim);cursor:not-allowed;background:transparent}\n\n/* PANEL */\n#s-panel{justify-content:flex-start;padding:5rem 1.5rem 1.5rem;gap:1.5rem}\n.panel-header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2);padding-bottom:1rem}\n.panel-title{font-family:var(--font-display);color:var(--blue);font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase}\n.panel-status{display:flex;align-items:center;gap:8px;font-size:11px}\n.status-dot{width:8px;height:8px;border-radius:50%;background:var(--red)}\n.status-dot.ok{background:var(--green);animation:none}\n.status-dot.warn{animation:blink-led 1s infinite}\n@keyframes blink-led{0%,100%{opacity:1}50%{opacity:.2}}\n.modules-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:760px}\n.mod-card{background:linear-gradient(160deg, var(--panel), var(--panel3));border:1px solid var(--red);border-radius:6px;padding:1.25rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;box-shadow:var(--shadow-panel)}\n.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);transition:background .3s}\n.mod-card:hover{border-color:#ff7070;transform:translateY(-2px);box-shadow:var(--shadow-panel),var(--glow-red)}\n.mod-card.done{border-color:var(--green);box-shadow:var(--shadow-panel),var(--glow-green)}.mod-card.done::before{background:var(--green)}\n.mod-led{position:absolute;top:1rem;right:1rem;width:10px;height:10px;border-radius:50%;background:var(--red);animation:blink-led 1.5s infinite}\n.mod-card.done .mod-led{background:var(--green);animation:none;box-shadow:0 0 8px var(--green)}\n.mod-icon{font-size:32px;margin-bottom:.75rem;display:block}\n.mod-name{font-size:13px;font-weight:bold;color:var(--text-bright);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}\n.mod-desc{font-size:11px;color:var(--text-dim)}.mod-card.done .mod-desc{color:var(--green)}\n.mod-id-badge{position:absolute;bottom:.8rem;right:.8rem;font-size:10px;color:var(--text-dim);letter-spacing:1px;border:1px solid var(--border2);padding:2px 6px;border-radius:2px}\n.reactor-section{width:100%;max-width:760px}\n.reactor-btn{width:100%;background:var(--panel);border:1px solid var(--border2);border-radius:6px;padding:1rem;cursor:not-allowed;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:12px;font-family:inherit}\n.reactor-btn.ready{border-color:var(--amber);cursor:pointer;animation:pulse-amber 2s infinite}\n.reactor-btn.ready:hover{background:rgba(255,171,0,.1)}\n@keyframes pulse-amber{0%,100%{box-shadow:0 0 0 0 rgba(255,171,0,.3)}50%{box-shadow:0 0 0 12px rgba(255,171,0,0)}}\n.reactor-btn-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}\n.reactor-btn.ready .reactor-btn-label{color:var(--amber)}\n.prog-bar-wrap{width:100%;max-width:760px}\n.prog-bar-track{background:var(--panel);border:1px solid var(--border);border-radius:2px;height:6px;overflow:hidden}\n.prog-bar-fill{height:100%;background:var(--green);border-radius:2px;transition:width .5s;width:0%}\n.prog-label{font-size:10px;color:var(--text-dim);margin-top:4px;letter-spacing:1px}\n\n/* MODULE SCREEN */\n#s-module{justify-content:flex-start;padding:5rem 1.5rem 1.5rem;gap:1.5rem}\n.mod-header{width:100%;max-width:640px;display:flex;align-items:center;gap:12px;padding-bottom:1rem;border-bottom:1px solid var(--border2)}\n.back-btn{background:transparent;border:1px solid var(--border2);color:var(--text-dim);font-family:inherit;font-size:11px;padding:6px 12px;cursor:pointer;letter-spacing:1px;transition:all .2s}\n.back-btn:hover{border-color:var(--text-dim);color:var(--text)}\n.mod-header-title{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--blue);letter-spacing:3px;text-transform:uppercase}\n.mod-serial{font-size:10px;color:var(--purple);letter-spacing:2px;margin-left:auto}\n\n/* CHALLENGE BOXES */\n.challenge-box{background:linear-gradient(160deg, var(--panel), var(--panel3));border:1px solid var(--border2);border-radius:6px;padding:1.5rem;width:100%;max-width:640px;box-shadow:var(--shadow-panel)}\n.challenge-title{font-size:14px;color:var(--text-bright);margin-bottom:.5rem;letter-spacing:1px}\n.challenge-desc{font-size:12px;color:var(--text-dim);margin-bottom:1.5rem;line-height:1.7}\n.feedback{margin-top:1rem;padding:10px 14px;border-radius:4px;font-size:12px;line-height:1.6;display:none}\n.feedback.ok{background:var(--ok-bg);border:1px solid var(--green);color:var(--green);display:block}\n.feedback.err{background:var(--err-bg);border:1px solid var(--red);color:#ff7070;display:block}\n.serial-box{background:rgba(206,147,216,.06);border:1px solid rgba(206,147,216,.3);border-radius:5px;padding:.75rem 1rem;margin-bottom:1rem;font-size:11px;color:var(--purple);line-height:1.8;box-shadow:0 2px 12px rgba(206,147,216,.06)}\n.serial-box strong{color:var(--text-bright)}\n.hint-box{background:var(--panel);border:1px solid var(--border2);border-radius:6px;padding:1.5rem;width:100%;max-width:640px;font-size:11px;color:var(--text-dim);line-height:1.8;box-shadow:var(--shadow-panel)}\n.hint-title{color:var(--blue);letter-spacing:1px;margin-bottom:6px;font-size:11px}\n\n/* MOD-A: CALOR */\n.heat-viz{display:flex;align-items:center;justify-content:center;margin:1rem 0}\n.reservoir{border-radius:6px;padding:1rem 1.5rem;text-align:center;border:1px solid;min-width:120px;transition:all .3s}\n.reservoir.hot{border-color:#ff6444;background:rgba(255,100,68,.1)}\n.reservoir.cold{border-color:#4fc3f7;background:rgba(79,195,247,.1)}\n.reservoir.hidden-r{border-color:var(--amber);background:rgba(255,171,0,.08)}\n.res-temp{font-size:22px;font-weight:bold}\n.reservoir.hot .res-temp{color:#ff6444}\n.reservoir.cold .res-temp{color:#4fc3f7}\n.reservoir.hidden-r .res-temp{color:var(--amber);letter-spacing:2px}\n.res-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:4px}\n.res-id{font-size:10px;color:var(--purple);letter-spacing:1px;margin-top:2px}\n.arrow-zone{display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 1rem}\n.arrow-btn{background:var(--panel2);border:1px solid var(--border2);border-radius:4px;padding:8px 16px;cursor:pointer;font-family:inherit;font-size:18px;color:var(--text);transition:all .2s}\n.arrow-btn:hover{border-color:var(--amber);color:var(--amber)}\n.arrow-btn.selected{border-color:var(--blue);background:rgba(79,195,247,.1);color:var(--blue)}\n.arrow-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-align:center}\n\n/* MOD-B: TEMPERATURA */\n.sensor-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:1rem 0}\n.sensor-card{background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:1rem;text-align:center}\n.sensor-card.calibrated{border-color:var(--green)}\n.sensor-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-bottom:4px}\n.sensor-id{font-size:10px;color:var(--purple);margin-bottom:6px}\n.sensor-val{font-size:18px;color:var(--amber);font-weight:bold;margin-bottom:4px}\n.sensor-unit-display{font-size:10px;color:var(--text-dim);margin-bottom:8px}\n.sensor-input-wrap{display:flex;align-items:center;gap:4px;justify-content:center}\n.sensor-input{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:13px;padding:5px 8px;border-radius:3px;width:75px;text-align:center}\n.sensor-input:focus{outline:none;border-color:var(--blue)}\n.sensor-unit{font-size:11px;color:var(--text-dim)}\n.sensor-check-btn{background:transparent;border:1px solid var(--border2);color:var(--text-dim);font-family:inherit;font-size:11px;padding:4px 10px;cursor:pointer;border-radius:3px;margin-top:6px;transition:all .2s;width:100%}\n.sensor-check-btn:hover{border-color:var(--green);color:var(--green)}\n\n/* MOD-C: PRIMEIRA LEI */\n.energy-meters{display:flex;gap:1rem;margin:1rem 0;flex-wrap:wrap}\n.e-meter{background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:1rem;flex:1;min-width:130px;text-align:center}\n.e-meter.target{border-color:var(--amber)}.e-meter.hidden-m{border-color:var(--purple)}\n.e-symbol{font-size:12px;color:var(--text-dim);letter-spacing:1px;margin-bottom:6px}\n.e-value{font-size:24px;font-weight:bold;color:var(--blue)}\n.e-meter.target .e-value{color:var(--amber)}.e-meter.hidden-m .e-value{color:var(--purple);letter-spacing:2px}\n.e-unit{font-size:11px;color:var(--text-dim);margin-top:4px}\n.e-id{font-size:10px;color:var(--purple);margin-bottom:4px}\n.slider-wrap{margin:1rem 0}\n.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}\n.slider-row label{font-size:11px;color:var(--text-dim);letter-spacing:1px;min-width:60px}\ninput[type=range]{-webkit-appearance:none;flex:1;height:4px;background:var(--border2);border-radius:2px;outline:none}\ninput[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid var(--bg)}\n.slider-readout{font-size:13px;color:var(--blue);min-width:60px;text-align:right}\n\n/* MOD-D: ENTROPIA */\n.process-cards{display:flex;flex-direction:column;gap:8px;margin:1rem 0}\n.proc-card{background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:.9rem 1rem;display:flex;align-items:center;gap:12px;cursor:grab;transition:all .2s;user-select:none}\n.proc-card:active{cursor:grabbing}\n.proc-card.dragging{opacity:.5;border-color:var(--amber)}\n.proc-card.drag-over{border-color:var(--blue);background:rgba(79,195,247,.06)}\n.proc-rank{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-dim);flex-shrink:0}\n.proc-text{font-size:12px;color:var(--text);line-height:1.5}\n.proc-icon{font-size:20px;flex-shrink:0}\n.drag-hint{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-bottom:6px}\n\n/* MOD-E: CICLO */\n.ciclo-steps{display:flex;flex-direction:column;gap:8px;margin:1rem 0}\n.ciclo-step{background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:1rem;display:flex;align-items:flex-start;gap:16px}\n.ciclo-step.done-step{border-color:var(--green)}\n.step-num{font-size:18px;color:var(--text-dim);min-width:28px;text-align:center;padding-top:2px}\n.step-info{flex:1}\n.step-name{font-size:13px;color:var(--text-bright);margin-bottom:4px}\n.step-clue{font-size:11px;color:var(--amber);margin-bottom:8px;letter-spacing:.5px}\n.step-select{display:flex;gap:6px;flex-wrap:wrap}\n.step-opt{background:transparent;border:1px solid var(--border2);color:var(--text-dim);font-family:inherit;font-size:11px;padding:5px 10px;cursor:pointer;border-radius:3px;transition:all .2s;letter-spacing:1px}\n.step-opt:hover{border-color:var(--amber);color:var(--amber)}\n.step-opt.selected-opt{border-color:var(--blue);color:var(--blue);background:rgba(79,195,247,.08)}\n.step-opt.correct-opt{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}\n.step-opt.wrong-opt{border-color:var(--red);color:var(--red);background:rgba(255,61,61,.08)}\n.reactor-model-badge{display:inline-block;background:rgba(206,147,216,.12);border:1px solid var(--purple);color:var(--purple);font-size:11px;letter-spacing:2px;padding:4px 12px;border-radius:3px;margin-bottom:1rem}\n\n/* MOD-F: C\u00d3DIGO */\n.seq-display{display:flex;gap:8px;flex-wrap:wrap;margin:1rem 0}\n.seq-cell{width:44px;height:44px;background:var(--panel2);border:1px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:var(--text-dim);transition:all .3s}\n.seq-cell.filled{border-color:var(--blue);color:var(--blue)}\n.seq-cell.correct{border-color:var(--green);color:var(--green)}\n.seq-cell.wrong{border-color:var(--red);color:var(--red);animation:shake .4s}\n@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}\n.seq-keys{display:flex;flex-wrap:wrap;gap:6px;margin:1rem 0}\n.seq-key{background:var(--panel2);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:14px;width:48px;height:48px;cursor:pointer;border-radius:4px;transition:all .2s;display:flex;align-items:center;justify-content:center}\n.seq-key:hover{border-color:var(--blue);color:var(--blue)}\n.seq-key.del{color:var(--red);border-color:var(--border2);font-size:12px}\n.seq-key.del:hover{border-color:var(--red)}\n\n/* MOD-G: V\u00c1LVULAS */\n.valves-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:1rem 0}\n.valve-card{background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:1rem;text-align:center;cursor:pointer;transition:all .2s;user-select:none}\n.valve-card:hover{border-color:var(--amber)}\n.valve-card.open-v{border-color:var(--green);background:rgba(0,230,118,.06)}\n.valve-card.closed-v{border-color:var(--red);background:rgba(255,61,61,.06)}\n.valve-id{font-size:10px;color:var(--purple);letter-spacing:1px;margin-bottom:8px}\n.valve-icon{font-size:28px;margin-bottom:6px}\n.valve-label{font-size:11px;color:var(--text-dim);letter-spacing:1px}\n.valve-card.open-v .valve-label{color:var(--green)}\n.valve-card.closed-v .valve-label{color:var(--red)}\n.valve-condition{font-size:10px;color:var(--text-dim);margin-top:4px;font-style:italic}\n\n/* BOOM */\n#s-boom{background:radial-gradient(circle at 50% 45%, rgba(255,61,61,.12), #0a0000 70%)}\n.boom-wrap{text-align:center;max-width:500px}\n.boom-icon{font-size:80px;animation:boom-pulse .5s infinite;display:block;margin-bottom:1.5rem}\n@keyframes boom-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}\n.boom-title{font-family:var(--font-display);font-size:26px;font-weight:900;color:var(--red);letter-spacing:5px;text-transform:uppercase;margin-bottom:1rem;text-shadow:var(--glow-red)}\n.boom-reason{font-size:13px;color:#ff7070;line-height:1.8;margin-bottom:2rem}\n\n/* VIT\u00d3RIA */\n#s-end{gap:0}\n.end-wrap{background:linear-gradient(160deg, var(--panel), var(--panel3));border:1px solid var(--border2);border-radius:8px;padding:2.5rem;max-width:560px;width:100%;text-align:center;box-shadow:var(--shadow-deep)}\n.end-reactor{font-size:64px;display:block;margin-bottom:1rem;animation:pulse-glow 2s infinite}\n@keyframes pulse-glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4)}}\n.end-title{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--green);letter-spacing:3px;text-transform:uppercase;margin-bottom:.5rem;text-shadow:var(--glow-green)}\n.end-time{font-size:12px;color:var(--amber);letter-spacing:2px;margin-bottom:1.5rem}\n.end-story{font-size:13px;color:var(--text);line-height:1.9;text-align:left;margin-bottom:1.5rem}\n.end-story span{color:var(--blue)}\n.end-quote{border-left:2px solid var(--green);padding-left:1rem;font-size:12px;color:var(--green);font-style:italic;line-height:1.7;text-align:left;margin-bottom:1.5rem}\n.end-credits{font-size:10px;color:var(--text-dim);letter-spacing:2px;border-top:1px solid var(--border);padding-top:1rem;margin-top:.5rem}\n.particles-container{position:fixed;inset:0;pointer-events:none;z-index:100}\n.particle{position:absolute;border-radius:50%;pointer-events:none;animation:float-p linear forwards}\n@keyframes float-p{0%{transform:translateY(0) scale(1);opacity:.9}100%{transform:translateY(-100vh) scale(0);opacity:0}}\n\n/* \u2550\u2550\u2550 MODULE DOOR TRANSITION \u2550\u2550\u2550 */\n.door-layer{position:fixed;inset:0;z-index:9996;pointer-events:none;display:none;}\n.door-layer.active{display:block;pointer-events:all;}\n.door-panel{\n  position:absolute;top:0;bottom:0;width:50%;\n  background:\n    linear-gradient(90deg, rgba(79,195,247,.05), transparent 40%),\n    repeating-linear-gradient(0deg, rgba(0,0,0,.3) 0px, rgba(0,0,0,.3) 2px, transparent 2px, transparent 40px),\n    var(--panel3);\n  border-top:3px solid var(--border2);border-bottom:3px solid var(--border2);\n  box-shadow:var(--shadow-deep), inset 0 0 70px rgba(0,0,0,.65);\n  transition:transform .45s cubic-bezier(.65,0,.35,1);\n}\n.door-panel.left{left:0;border-right:2px solid var(--amber);transform:translateX(0);}\n.door-panel.right{right:0;border-left:2px solid var(--amber);transform:translateX(0);}\n.door-layer.open .door-panel.left{transform:translateX(-100%);}\n.door-layer.open .door-panel.right{transform:translateX(100%);}\n@keyframes door-spark{0%,100%{opacity:0}45%,55%{opacity:1}}\n.door-seam-spark{\n  position:absolute;top:0;bottom:0;left:50%;width:3px;transform:translateX(-50%);\n  background:var(--amber);box-shadow:0 0 12px 3px var(--amber);\n  animation:door-spark .25s ease-in-out 2;\n}\n\n@media(max-width:540px){\n  .modules-grid{grid-template-columns:1fr}\n  .sensor-grid{grid-template-columns:1fr 1fr}\n  .energy-meters{flex-direction:column}\n  .valves-grid{grid-template-columns:1fr 1fr}\n}\n</style>\n</head>\n<body>\n\n<div class=\"danger-vignette\" id=\"danger-vignette\"></div>\n\n<div class=\"door-layer\" id=\"door-layer\">\n  <div class=\"door-panel left\"></div>\n  <div class=\"door-panel right\"></div>\n  <div class=\"door-seam-spark\" id=\"door-spark\"></div>\n</div>\n\n<!-- TIMER BAR -->\n<div class=\"timer-bar\" id=\"timer-bar\">\n  <div>\n    <div style=\"font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:2px\">TEMPO</div>\n    <div class=\"timer-display\" id=\"timer-display\">08:00</div>\n  </div>\n  <div style=\"text-align:center\">\n    <div style=\"font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:4px\">ERROS</div>\n    <div class=\"strikes-wrap\">\n      <div class=\"strike-led\" id=\"s0\"></div>\n      <div class=\"strike-led\" id=\"s1\"></div>\n      <div class=\"strike-led\" id=\"s2\"></div>\n    </div>\n  </div>\n  <div style=\"text-align:right\">\n    <div style=\"font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:2px\">S\u00c9RIE</div>\n    <div id=\"serial-display\" style=\"font-size:13px;color:var(--purple);letter-spacing:2px\">---</div>\n  </div>\n</div>\n\n<!-- INTRO -->\n<div id=\"s-intro\" class=\"screen active\">\n  <div class=\"intro-terminal\">\n    <div class=\"terminal-bar\">\n      <div class=\"dot-r\"></div><div class=\"dot-y\"></div><div class=\"dot-g\"></div>\n      <span style=\"margin-left:8px\">lab-thermo-01 \u2014 terminal de emerg\u00eancia</span>\n    </div>\n    <div class=\"terminal-body\" id=\"terminal-body\"></div>\n  </div>\n  <button class=\"btn-primary\" id=\"start-btn\" disabled onclick=\"startGame()\">\u25b6 Iniciar Protocolo</button>\n</div>\n\n<!-- PAINEL -->\n<div id=\"s-panel\" class=\"screen\">\n  <div class=\"panel-header\">\n    <div class=\"panel-title\">Reator Entr\u00f3pico \u2014 Painel de Controle</div>\n    <div class=\"panel-status\">\n      <div class=\"status-dot warn\" id=\"main-dot\"></div>\n      <span id=\"main-status-txt\" style=\"font-size:11px;color:var(--text-dim)\">Falha cr\u00edtica detectada</span>\n    </div>\n  </div>\n  <div class=\"modules-grid\">\n    <div class=\"mod-card\" id=\"mc-0\" onclick=\"openModule(0)\">\n      <div class=\"mod-led\"></div><span class=\"mod-icon\">\ud83d\udd25</span>\n      <div class=\"mod-name\">M\u00f3dulo de Calor</div>\n      <div class=\"mod-desc\" id=\"md-0\">OFFLINE \u2014 Aguardando restaura\u00e7\u00e3o</div>\n      <div class=\"mod-id-badge\">MOD-A</div>\n    </div>\n    <div class=\"mod-card\" id=\"mc-1\" onclick=\"openModule(1)\">\n      <div class=\"mod-led\"></div><span class=\"mod-icon\">\ud83c\udf21\ufe0f</span>\n      <div class=\"mod-name\">M\u00f3dulo de Temperatura</div>\n      <div class=\"mod-desc\" id=\"md-1\">OFFLINE \u2014 Aguardando restaura\u00e7\u00e3o</div>\n      <div class=\"mod-id-badge\">MOD-B</div>\n    </div>\n    <div class=\"mod-card\" id=\"mc-2\" onclick=\"openModule(2)\">\n      <div class=\"mod-led\"></div><span class=\"mod-icon\">\u2699\ufe0f</span>\n      <div class=\"mod-name\">Primeira Lei</div>\n      <div class=\"mod-desc\" id=\"md-2\">OFFLINE \u2014 Aguardando restaura\u00e7\u00e3o</div>\n      <div class=\"mod-id-badge\">MOD-C</div>\n    </div>\n    <div class=\"mod-card\" id=\"mc-3\" onclick=\"openModule(3)\">\n      <div class=\"mod-led\"></div><span class=\"mod-icon\">\u267b\ufe0f</span>\n      <div class=\"mod-name\">Entropia</div>\n      <div class=\"mod-desc\" id=\"md-3\">OFFLINE \u2014 Aguardando restaura\u00e7\u00e3o</div>\n      <div class=\"mod-id-badge\">MOD-D</div>\n    </div>\n    <div class=\"mod-card\" id=\"mc-4\" onclick=\"openModule(4)\">\n      <div class=\"mod-led\"></div><span class=\"mod-icon\">\ud83d\udd04</span>\n      <div class=\"mod-name\">Ciclo Termodin\u00e2mico</div>\n      <div class=\"mod-desc\" id=\"md-4\">OFFLINE \u2014 Aguardando restaura\u00e7\u00e3o</div>\n      <div class=\"mod-id-badge\">MOD-E</div>\n    </div>\n    <div class=\"mod-card\" id=\"mc-5\" onclick=\"openModule(5)\">\n      <div class=\"mod-led\"></div><span class=\"mod-icon\">\ud83d\udd10</span>\n      <div class=\"mod-name\">C\u00f3digo de Igni\u00e7\u00e3o</div>\n      <div class=\"mod-desc\" id=\"md-5\">OFFLINE \u2014 Aguardando restaura\u00e7\u00e3o</div>\n      <div class=\"mod-id-badge\">MOD-F</div>\n    </div>\n    <div class=\"mod-card\" id=\"mc-6\" onclick=\"openModule(6)\" style=\"grid-column:span 2\">\n      <div class=\"mod-led\"></div><span class=\"mod-icon\">\ud83d\udeb0</span>\n      <div class=\"mod-name\">Sistema de V\u00e1lvulas</div>\n      <div class=\"mod-desc\" id=\"md-6\">OFFLINE \u2014 Aguardando restaura\u00e7\u00e3o</div>\n      <div class=\"mod-id-badge\">MOD-G</div>\n    </div>\n  </div>\n  <div class=\"prog-bar-wrap\">\n    <div class=\"prog-bar-track\"><div class=\"prog-bar-fill\" id=\"prog-fill\"></div></div>\n    <div class=\"prog-label\" id=\"prog-label\">0 / 7 m\u00f3dulos restaurados</div>\n  </div>\n  <div class=\"reactor-section\">\n    <button class=\"reactor-btn\" id=\"reactor-btn\" disabled onclick=\"goEnd()\">\n      <span style=\"font-size:24px\">\u26a1</span>\n      <span class=\"reactor-btn-label\">Ligar Reator</span>\n    </button>\n  </div>\n</div>\n\n<!-- M\u00d3DULO -->\n<div id=\"s-module\" class=\"screen\">\n  <div class=\"mod-header\">\n    <button class=\"back-btn\" onclick=\"goPanel()\">\u2190 Voltar</button>\n    <div class=\"mod-header-title\" id=\"mod-screen-title\">M\u00f3dulo</div>\n    <div class=\"mod-serial\" id=\"mod-serial-display\"></div>\n  </div>\n  <div id=\"mod-content\" style=\"width:100%;max-width:640px;display:flex;flex-direction:column;gap:1rem\"></div>\n</div>\n\n<!-- BOOM -->\n<div id=\"s-boom\" class=\"screen\">\n  <div class=\"boom-wrap\">\n    <span class=\"boom-icon\">\ud83d\udca5</span>\n    <div class=\"boom-title\">FALHA CATASTR\u00d3FICA</div>\n    <div class=\"boom-reason\" id=\"boom-reason\">O reator entrou em colapso.</div>\n    <button class=\"btn-primary\" onclick=\"location.reload()\">\u21ba Tentar Novamente</button>\n  </div>\n</div>\n\n<!-- VIT\u00d3RIA -->\n<div id=\"s-end\" class=\"screen\">\n  <div class=\"particles-container\" id=\"parts\"></div>\n  <div class=\"end-wrap\">\n    <span class=\"end-reactor\">\u2600\ufe0f</span>\n    <div class=\"end-title\">Reator Online</div>\n    <div class=\"end-time\" id=\"end-time\">Tempo: --:--</div>\n    <div class=\"end-story\">\n      O sol ainda n\u00e3o havia nascido quando o <span>Dr. Vale</span> e seu t\u00e9cnico especialista\n      digitaram o \u00faltimo comando.<br><br>\n      Sete m\u00f3dulos. Cada um com seus segredos \u2014 informa\u00e7\u00f5es escondidas, divididas entre\n      dois pares de olhos que nunca se viram durante a miss\u00e3o. S\u00f3 vozes. S\u00f3 confian\u00e7a.<br><br>\n      O painel acendeu de verde. O reator emitiu um som grave e constante \u2014\n      <span>o som de um sistema em equil\u00edbrio.</span>\n    </div>\n    <div class=\"end-quote\">\n      \"A comunica\u00e7\u00e3o \u00e9 a termodin\u00e2mica do conhecimento \u2014<br>\n      a informa\u00e7\u00e3o s\u00f3 flui de quem sabe para quem precisa.\"\n    </div>\n    <div class=\"end-credits\">ENTROPIA EM A\u00c7\u00c3O \u00b7 UFAL \u00b7 TERMODIN\u00c2MICA \u00b7 2026</div>\n    <button class=\"btn-primary\" onclick=\"location.reload()\" style=\"margin-top:1.5rem\">\u21ba Jogar Novamente</button>\n  </div>\n</div>\n\n<\u0073cript>\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  AUDIO ENGINE\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nlet audioCtx=null;\nfunction getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}\nfunction beep(freq,dur,type='square',vol=0.12){\n  try{\n    const a=getAudio(),o=a.createOscillator(),g=a.createGain();\n    o.connect(g);g.connect(a.destination);\n    o.type=type;o.frequency.value=freq;\n    g.gain.setValueAtTime(vol,a.currentTime);\n    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);\n    o.start();o.stop(a.currentTime+dur);\n  }catch(e){}\n}\nfunction playClick(){beep(700,.05,'square',.05);}\nfunction playSuccess(){beep(523,.1);setTimeout(()=>beep(659,.1),120);setTimeout(()=>beep(784,.2),240);}\nfunction playError(){beep(220,.15,'sawtooth',.18);setTimeout(()=>beep(180,.2,'sawtooth',.14),160);}\nfunction playAlarmTick(){beep(880,.08,'sawtooth',.14);}\nfunction playVictory(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.25,'sine',.14),i*140));}\nfunction playBoom(){\n  beep(60,.8,'sawtooth',.22);\n  setTimeout(()=>beep(45,1,'sawtooth',.18),80);\n  setTimeout(()=>beep(35,1.2,'square',.12),200);\n}\nfunction playDoorClose(){beep(110,.12,'square',.1);setTimeout(()=>beep(85,.16,'sawtooth',.07),85);}\nfunction playDoorOpen(){beep(150,.07,'square',.07);setTimeout(()=>beep(195,.09,'square',.05),110);}\nfunction playGlitchTick(){beep(180+Math.random()*120,.04,'square',.045);}\n\n// \u2500\u2500 Tension drone: layered ambient that intensifies with strikes/danger \u2500\u2500\nlet droneNodes=null;\nlet droneDangerLevel=0; // 0..3, mirrors strikes\nfunction startDrone(){\n  if(droneNodes) return;\n  try{\n    const a=getAudio();\n    const root=a.createOscillator(); const rootGain=a.createGain();\n    root.type='sine'; root.frequency.value=46; rootGain.gain.value=0.020;\n\n    const dis=a.createOscillator(); const disGain=a.createGain();\n    dis.type='sawtooth'; dis.frequency.value=49; disGain.gain.value=0.0;\n\n    const tremolo=a.createOscillator(); const tremoloGain=a.createGain();\n    tremolo.type='sine'; tremolo.frequency.value=0.11; tremoloGain.gain.value=0.009;\n\n    const filter=a.createBiquadFilter();\n    filter.type='lowpass'; filter.frequency.value=210;\n\n    tremolo.connect(tremoloGain); tremoloGain.connect(rootGain.gain);\n    root.connect(rootGain); dis.connect(disGain);\n    rootGain.connect(filter); disGain.connect(filter); filter.connect(a.destination);\n\n    root.start(); dis.start(); tremolo.start();\n    droneNodes={root,rootGain,dis,disGain,tremolo,tremoloGain,filter};\n    droneDangerLevel=0;\n  }catch(e){}\n}\nfunction stopDrone(){\n  if(!droneNodes) return;\n  try{droneNodes.root.stop();droneNodes.dis.stop();droneNodes.tremolo.stop();}catch(e){}\n  droneNodes=null;\n}\n// level: 0 (calm) .. 3 (critical, near-explosion)\nfunction setDroneLevel(level){\n  droneDangerLevel=level;\n  if(!droneNodes) return;\n  const a=getAudio(), now=a.currentTime;\n  const steps=[\n    {dis:0.0,   root:0.020, trem:0.11},\n    {dis:0.012, root:0.022, trem:0.22},\n    {dis:0.022, root:0.026, trem:0.40},\n    {dis:0.034, root:0.030, trem:0.65},\n  ];\n  const s=steps[Math.min(level,3)];\n  try{\n    droneNodes.disGain.gain.setTargetAtTime(s.dis, now, 0.6);\n    droneNodes.rootGain.gain.setTargetAtTime(s.root, now, 0.6);\n    droneNodes.tremolo.frequency.setTargetAtTime(s.trem, now, 1.0);\n  }catch(e){}\n}\nfunction playStrikeSting(){\n  try{\n    const a=getAudio();\n    const o=a.createOscillator(); const g=a.createGain();\n    o.type='sawtooth';\n    o.frequency.setValueAtTime(140,a.currentTime);\n    o.frequency.exponentialRampToValueAtTime(55,a.currentTime+0.55);\n    g.gain.setValueAtTime(0.055,a.currentTime);\n    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.65);\n    o.connect(g);g.connect(a.destination);\n    o.start();o.stop(a.currentTime+0.65);\n  }catch(e){}\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  ESTADO GLOBAL\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nconst TOTAL_MODS = 7;\nconst TOTAL_TIME = 8 * 60;\nconst MAX_STRIKES = 3;\n\nlet done = Array(TOTAL_MODS).fill(false);\nlet strikes = 0;\nlet currentMod = -1;\nlet timeLeft = TOTAL_TIME;\nlet timerInterval = null;\nlet serialNumber = '';\nlet serialHasVowel = false;\nlet serialSum = 0;\n\n// Modelo do reator (para MOD-E ciclo e MOD-G v\u00e1lvulas)\nlet reactorModel = '';\nconst REACTOR_MODELS = ['ALFA','BETA','GAMA','DELTA'];\n\nfunction generateSerial() {\n  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';\n  const nums  = '0123456789';\n  let s = '';\n  for (let i=0;i<3;i++) s += chars[Math.floor(Math.random()*chars.length)];\n  s += '-';\n  for (let i=0;i<3;i++) s += nums[Math.floor(Math.random()*nums.length)];\n  serialNumber   = s;\n  serialHasVowel = /[AEIOU]/.test(s);\n  serialSum      = [...s].filter(c=>/\\d/.test(c)).reduce((a,b)=>a+parseInt(b),0);\n  reactorModel   = REACTOR_MODELS[Math.floor(Math.random()*REACTOR_MODELS.length)];\n  document.getElementById('serial-display').textContent = serialNumber;\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  TELAS\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction show(id){\n  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n}\n\n// Runs screenChangeFn while the door is fully closed (hiding the swap), then slides it open.\nfunction triggerDoorTransition(screenChangeFn){\n  const layer=document.getElementById('door-layer');\n  if(!layer){ screenChangeFn(); return; }\n  layer.classList.add('active');\n  layer.classList.remove('open');\n  playDoorClose();\n  setTimeout(()=>{\n    screenChangeFn();\n    setTimeout(()=>{\n      playDoorOpen();\n      layer.classList.add('open');\n      setTimeout(()=>{ layer.classList.remove('active','open'); },500);\n    },120);\n  },300);\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  INTRO\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nconst introLines = [\n  {text:'> SISTEMA: lab-thermo-01',cls:'prompt',delay:0},\n  {text:'> HORA: 03:14:22',cls:'prompt',delay:300},\n  {text:'',cls:'',delay:500},\n  {text:'[ALERTA CR\u00cdTICO \u2014 N\u00cdVEL 5]',cls:'warn',delay:700},\n  {text:'Falha catastr\u00f3fica no Reator Entr\u00f3pico.',cls:'dim',delay:1000},\n  {text:'SETE sistemas desligados simultaneamente.',cls:'dim',delay:1300},\n  {text:'Risco de colapso termonuclear iminente.',cls:'dim',delay:1600},\n  {text:'',cls:'',delay:1900},\n  {text:'PROTOCOLO DE EMERG\u00caNCIA \u2014 MODO DUPLO:',cls:'title',delay:2100},\n  {text:'OPERADOR: voc\u00ea est\u00e1 no painel de controle.',cls:'purp',delay:2500},\n  {text:'ESPECIALISTA: possui o manual de instru\u00e7\u00f5es.',cls:'purp',delay:2900},\n  {text:'Comuniquem-se. N\u00e3o se vejam. Confiem um no outro.',cls:'dim',delay:3300},\n  {text:'',cls:'',delay:3600},\n  {text:'  \ud83d\udd25 MOD-A: Calor ............. [OFFLINE]',cls:'warn',delay:3800},\n  {text:'  \ud83c\udf21\ufe0f MOD-B: Temperatura ....... [OFFLINE]',cls:'warn',delay:4000},\n  {text:'  \u2699\ufe0f MOD-C: Primeira Lei ...... [OFFLINE]',cls:'warn',delay:4200},\n  {text:'  \u267b\ufe0f MOD-D: Entropia .......... [OFFLINE]',cls:'warn',delay:4400},\n  {text:'  \ud83d\udd04 MOD-E: Ciclo Term\u00f3d. ..... [OFFLINE]',cls:'warn',delay:4600},\n  {text:'  \ud83d\udd10 MOD-F: C\u00f3digo Igni\u00e7\u00e3o .... [OFFLINE]',cls:'warn',delay:4800},\n  {text:'  \ud83d\udeb0 MOD-G: V\u00e1lvulas .......... [OFFLINE]',cls:'warn',delay:5000},\n  {text:'',cls:'',delay:5200},\n  {text:'TEMPO LIMITE: 08:00 | ERROS M\u00c1XIMOS: 3',cls:'warn',delay:5400},\n  {text:'Aguardando autoriza\u00e7\u00e3o do t\u00e9cnico...',cls:'prompt',delay:5700},\n];\n\nfunction runIntro(){\n  const body = document.getElementById('terminal-body');\n  document.body.classList.add('danger-3'); // system just failed \u2014 start fully unstable\n\n  introLines.forEach(l=>{\n    setTimeout(()=>{\n      const div=document.createElement('div');\n      div.className='t-line '+l.cls;\n      div.textContent=l.text;\n      body.appendChild(div);\n      body.scrollTop=body.scrollHeight;\n    },l.delay);\n  });\n\n  // glitch tick sounds while unstable (sparse, not annoying)\n  [350,900,1450,2200,3050,3700].forEach(t=>setTimeout(playGlitchTick,t));\n\n  // settle in stages, tied to the same narrative beats as the text\n  setTimeout(()=>{ // module scan in progress: ease off a notch\n    document.body.classList.remove('danger-3');\n    document.body.classList.add('danger-2');\n  }, 2100);\n  setTimeout(()=>{ // mission framed, alerts acknowledged: nearly stable\n    document.body.classList.remove('danger-2');\n    document.body.classList.add('danger-1');\n  }, 4200);\n  setTimeout(()=>{ // fully settled, ready for the technician\n    document.body.classList.remove('danger-1');\n    document.body.classList.add('danger-0');\n  }, 5700);\n\n  setTimeout(()=>{\n    const cur=document.createElement('div');\n    cur.className='t-line prompt';\n    cur.innerHTML='> <span class=\"cursor\"></span>';\n    body.appendChild(cur);\n    document.getElementById('start-btn').disabled=false;\n  },6100);\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  TIMER & STRIKES\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  DANGER STATE \u2014 reflects reactor health visually + sonically\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction computeDangerLevel(){\n  let level = strikes; // 0, 1, or 2 strikes map directly to base danger level\n  if(timeLeft<=60) level = Math.max(level, 2);\n  if(timeLeft<=20) level = 3;\n  return Math.min(level, 3);\n}\nfunction applyDangerVisuals(){\n  const level=computeDangerLevel();\n  document.body.classList.remove('danger-0','danger-1','danger-2','danger-3');\n  document.body.classList.add('danger-'+level);\n  setDroneLevel(level);\n}\n\nfunction startTimer(){\n  document.getElementById('timer-bar').classList.add('active');\n  timerInterval = setInterval(()=>{\n    timeLeft--;\n    updateTimerDisplay();\n    if(timeLeft===60) applyDangerVisuals();\n    if(timeLeft<=10 && timeLeft>0 && timeLeft%2===0) playAlarmTick();\n    if(timeLeft<=0){ clearInterval(timerInterval); triggerBoom('O tempo esgotou. O reator entrou em colapso.'); }\n  },1000);\n}\nfunction updateTimerDisplay(){\n  const m=Math.floor(timeLeft/60).toString().padStart(2,'0');\n  const s=(timeLeft%60).toString().padStart(2,'0');\n  const el=document.getElementById('timer-display');\n  el.textContent=m+':'+s;\n  el.className='timer-display'+(timeLeft<=60?' danger':timeLeft<=180?' warn':'');\n}\nfunction addStrike(){\n  if(strikes>=MAX_STRIKES)return;\n  document.getElementById('s'+strikes).classList.add('active');\n  strikes++;\n  timeLeft=Math.max(0,timeLeft-30);\n  updateTimerDisplay();\n  playError();\n  playStrikeSting();\n  setDroneLevel(strikes);\n  applyDangerVisuals();\n  if(strikes>=MAX_STRIKES){ clearInterval(timerInterval); setTimeout(()=>triggerBoom('Tr\u00eas erros cr\u00edticos. O sistema de seguran\u00e7a desligou o reator.'),600); }\n}\nfunction triggerBoom(reason){\n  clearInterval(timerInterval);\n  stopDrone();\n  playBoom();\n  document.getElementById('boom-reason').textContent=reason;\n  show('s-boom');\n  document.getElementById('timer-bar').classList.remove('active');\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  START / PANEL\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction startGame(){ generateSerial(); startTimer(); startDrone(); applyDangerVisuals(); goPanel(); }\nfunction goPanel(){ currentMod=-1; triggerDoorTransition(()=>{ show('s-panel'); updatePanel(); }); }\nfunction updatePanel(){\n  const count=done.filter(Boolean).length;\n  document.getElementById('prog-fill').style.width=(count/TOTAL_MODS*100)+'%';\n  document.getElementById('prog-label').textContent=count+' / '+TOTAL_MODS+' m\u00f3dulos restaurados';\n  const btn=document.getElementById('reactor-btn');\n  const dot=document.getElementById('main-dot');\n  const stxt=document.getElementById('main-status-txt');\n  if(count===TOTAL_MODS){\n    btn.disabled=false; btn.classList.add('ready');\n    dot.classList.add('ok'); dot.classList.remove('warn');\n    stxt.textContent='Pronto para ligar'; stxt.style.color='var(--green)';\n  } else {\n    btn.disabled=true; btn.classList.remove('ready');\n    dot.classList.remove('ok'); dot.classList.add('warn');\n    stxt.textContent='Falha cr\u00edtica detectada'; stxt.style.color='';\n  }\n}\nfunction markDone(i){\n  if(done[i])return; done[i]=true;\n  document.getElementById('mc-'+i).classList.add('done');\n  const descs=['ONLINE \u2014 Calor normalizado','ONLINE \u2014 Sensores calibrados','ONLINE \u2014 Balan\u00e7o ok',\n    'ONLINE \u2014 Entropia estabilizada','ONLINE \u2014 Ciclo operacional','ONLINE \u2014 Igni\u00e7\u00e3o autorizada','ONLINE \u2014 V\u00e1lvulas normalizadas'];\n  document.getElementById('md-'+i).textContent=descs[i];\n}\nconst modTitles=['\ud83d\udd25 MOD-A \u2014 Calor','\ud83c\udf21\ufe0f MOD-B \u2014 Temperatura','\u2699\ufe0f MOD-C \u2014 Primeira Lei',\n  '\u267b\ufe0f MOD-D \u2014 Entropia','\ud83d\udd04 MOD-E \u2014 Ciclo Termodin\u00e2mico','\ud83d\udd10 MOD-F \u2014 C\u00f3digo de Igni\u00e7\u00e3o','\ud83d\udeb0 MOD-G \u2014 V\u00e1lvulas'];\nconst modCodes=['MOD-A','MOD-B','MOD-C','MOD-D','MOD-E','MOD-F','MOD-G'];\nfunction openModule(i){\n  if(done[i]){goPanel();return;}\n  currentMod=i;\n  triggerDoorTransition(()=>{\n    show('s-module');\n    document.getElementById('mod-screen-title').textContent=modTitles[i];\n    document.getElementById('mod-serial-display').textContent=serialNumber+' / '+modCodes[i];\n    const c=document.getElementById('mod-content'); c.innerHTML='';\n    [buildCalor,buildTemp,buildPrimeiraLei,buildEntropia,buildCiclo,buildCodigo,buildValvulas][i](c,i);\n  });\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  MOD-A: CALOR\n//  Um dos dois valores fica oculto (??? no painel).\n//  O Especialista tem o valor no manual.\n//  6 cen\u00e1rios: 2 esquerda, 2 direita, 2 nulo.\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nconst CALOR_SCENARIOS = [\n  // 2 direita\n  {leftT:'600 K', leftId:'RES-01', rightT:'300 K', rightId:'RES-02', leftName:'C\u00c2MARA ALFA',  rightName:'DISSIPADOR BETA', hideSide:'right', answer:'right'},\n  {leftT:'850 K', leftId:'RES-03', rightT:'420 K', rightId:'RES-04', leftName:'N\u00daCLEO PRIME', rightName:'C\u00c2MARA SUL',      hideSide:'left',  answer:'right'},\n  // 2 esquerda\n  {leftT:'200 K', leftId:'RES-05', rightT:'750 K', rightId:'RES-06', leftName:'C\u00c2MARA GELO',  rightName:'N\u00daCLEO GAMA',    hideSide:'left',  answer:'left'},\n  {leftT:'310 K', leftId:'RES-07', rightT:'680 K', rightId:'RES-08', leftName:'DISSIPADOR D', rightName:'C\u00c2MARA QUENTE',  hideSide:'right', answer:'left'},\n  // 2 nulo\n  {leftT:'450 K', leftId:'RES-09', rightT:'450 K', rightId:'RES-10', leftName:'C\u00c2MARA SUL',   rightName:'C\u00c2MARA NORTE',   hideSide:'right', answer:'none'},\n  {leftT:'540 K', leftId:'RES-11', rightT:'540 K', rightId:'RES-12', leftName:'NUCLEO A1',    rightName:'NUCLEO A2',       hideSide:'left',  answer:'none'},\n];\nlet arrowSel=null, currentCalorSc=null, calorRound=0, calorUsed=[];\n\nfunction pickCalorScenario(){\n  const available=CALOR_SCENARIOS.map((_,i)=>i).filter(i=>!calorUsed.includes(i));\n  const pick=available[Math.floor(Math.random()*available.length)];\n  calorUsed.push(pick);\n  return CALOR_SCENARIOS[pick];\n}\nfunction buildCalor(el,idx){\n  calorRound=0; calorUsed=[];\n  renderCalorRound(el,idx);\n}\nfunction renderCalorRound(el,idx){\n  currentCalorSc = pickCalorScenario();\n  const sc=currentCalorSc;\n  arrowSel=null;\n  const leftShow  = sc.hideSide==='left'  ? '???' : sc.leftT;\n  const rightShow = sc.hideSide==='right' ? '???' : sc.rightT;\n  const leftCls   = sc.hideSide==='left'  ? 'hidden-r' : (sc.answer==='right'?'hot':'cold');\n  const rightCls  = sc.hideSide==='right' ? 'hidden-r' : (sc.answer==='right'?'cold':'hot');\n  const hiddenLabel = `[${sc.hideSide==='left'?sc.leftId:sc.rightId}] \u2014 valor no manual do Especialista`;\n\n  el.innerHTML=`\n    <div class=\"serial-box\">\n      <strong>S\u00c9RIE:</strong> ${serialNumber} &nbsp;|&nbsp; <strong>MOD-A</strong> &nbsp;|&nbsp; Pergunta ${calorRound+1}/3<br>\n      Diga ao Especialista: lado vis\u00edvel = <strong>${sc.hideSide==='left'?sc.rightId+' '+sc.rightT:sc.leftId+' '+sc.leftT}</strong><br>\n      ID oculto: <strong>${sc.hideSide==='left'?sc.leftId:sc.rightId}</strong>\n    </div>\n    <div class=\"challenge-box\">\n      <div class=\"challenge-title\">SISTEMA: V\u00e1lvula de Fluxo T\u00e9rmico</div>\n      <div class=\"challenge-desc\">\n        Um dos reservat\u00f3rios tem temperatura <strong style=\"color:var(--amber)\">oculta</strong>.<br>\n        Informe os IDs ao Especialista. Ele revelar\u00e1 o valor e dir\u00e1 a dire\u00e7\u00e3o do fluxo.\n      </div>\n      <div class=\"heat-viz\">\n        <div class=\"reservoir ${leftCls}\">\n          <div class=\"res-temp\">${leftShow}</div>\n          <div class=\"res-label\">${sc.leftName}</div>\n          <div class=\"res-id\">${sc.leftId}</div>\n        </div>\n        <div class=\"arrow-zone\">\n          <button class=\"arrow-btn\" id=\"arr-left\"  onclick=\"selectArrow('left')\">\u2190</button>\n          <div class=\"arrow-label\">FLUXO</div>\n          <button class=\"arrow-btn\" id=\"arr-right\" onclick=\"selectArrow('right')\">\u2192</button>\n          <button class=\"arrow-btn\" id=\"arr-none\"  onclick=\"selectArrow('none')\" style=\"font-size:12px;letter-spacing:1px\">NULO</button>\n        </div>\n        <div class=\"reservoir ${rightCls}\">\n          <div class=\"res-temp\">${rightShow}</div>\n          <div class=\"res-label\">${sc.rightName}</div>\n          <div class=\"res-id\">${sc.rightId}</div>\n        </div>\n      </div>\n      <div style=\"font-size:11px;color:var(--amber);margin:.5rem 0\">\u26a0 ${hiddenLabel}</div>\n      <button class=\"btn-primary\" onclick=\"checkCalor(${idx})\" style=\"margin-top:1rem\">Confirmar dire\u00e7\u00e3o</button>\n      <div id=\"fb-calor\" class=\"feedback\"></div>\n    </div>`;\n}\nfunction selectArrow(dir){\n  const els=['left','right','none'].map(d=>document.getElementById('arr-'+d));\n  if(els.some(e=>!e)) return; // defensive: content not loaded yet (e.g. mid door-transition)\n  playClick();\n  arrowSel=dir;\n  els.forEach((e,i)=>e.classList.toggle('selected',['left','right','none'][i]===dir));\n}\nfunction checkCalor(idx){\n  const fb=document.getElementById('fb-calor');\n  if(!fb) return; // defensive: content not loaded yet\n  if(!arrowSel){fb.className='feedback err';fb.textContent='Selecione uma dire\u00e7\u00e3o antes de confirmar.';return;}\n  if(arrowSel===currentCalorSc.answer){\n    calorRound++;\n    if(calorRound>=3){\n      fb.className='feedback ok';\n      fb.textContent='\u2713 Tr\u00eas perguntas corretas! Fluxo normalizado. M\u00f3dulo restaurado.';\n      playSuccess();\n      markDone(idx); setTimeout(()=>{if(currentMod===idx)goPanel();},2000);\n    } else {\n      fb.className='feedback ok';\n      fb.textContent='\u2713 Correto! Pr\u00f3xima pergunta (' + (calorRound+1) + '/3)...';\n      playSuccess();\n      const container=document.getElementById('mod-content');\n      setTimeout(()=>renderCalorRound(container,idx),1200);\n    }\n  } else {\n    fb.className='feedback err';\n    fb.textContent='\u2717 Dire\u00e7\u00e3o incorreta. Reveja com o Especialista. +30s de penalidade.';\n    arrowSel=null;\n    ['left','right','none'].forEach(d=>{const e=document.getElementById('arr-'+d); if(e)e.classList.remove('selected');});\n    addStrike();\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  MOD-B: TEMPERATURA\n//  6 sensores, sem resposta no manual \u2014 apenas f\u00f3rmulas.\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nconst ALL_SENSORS=[\n  {id:'S-K1',  val:'100 \u00b0C',  unit:'K',   answer:373},\n  {id:'S-K2',  val:'0 \u00b0C',    unit:'K',   answer:273},\n  {id:'S-K3',  val:'25 \u00b0C',   unit:'K',   answer:298},\n  {id:'S-K4',  val:'-40 \u00b0C',  unit:'K',   answer:233},\n  {id:'S-K5',  val:'150 \u00b0C',  unit:'K',   answer:423},\n  {id:'S-K6',  val:'-100 \u00b0C', unit:'K',   answer:173},\n  {id:'S-C1',  val:'373 K',   unit:'\u00b0C',  answer:100},\n  {id:'S-C2',  val:'500 K',   unit:'\u00b0C',  answer:227},\n  {id:'S-C3',  val:'273 K',   unit:'\u00b0C',  answer:0},\n  {id:'S-C4',  val:'600 K',   unit:'\u00b0C',  answer:327},\n  {id:'S-F1',  val:'77 \u00b0F',   unit:'\u00b0C',  answer:25},\n  {id:'S-F2',  val:'212 \u00b0F',  unit:'\u00b0C',  answer:100},\n  {id:'S-F3',  val:'32 \u00b0F',   unit:'\u00b0C',  answer:0},\n  {id:'S-FK1', val:'98.6 \u00b0F', unit:'K',   answer:310},\n  {id:'S-KF1', val:'300 K',   unit:'\u00b0F',  answer:80},\n];\nlet tempSensors=[], sensorOk=[];\n\nfunction buildTemp(el,idx){\n  const shuffled=[...ALL_SENSORS].sort(()=>Math.random()-.5);\n  tempSensors=shuffled.slice(0,6);\n  sensorOk=Array(6).fill(false);\n  const cards=tempSensors.map((s,i)=>`\n    <div class=\"sensor-card\" id=\"sc-${i}\">\n      <div class=\"sensor-label\">SENSOR</div>\n      <div class=\"sensor-id\">${s.id}</div>\n      <div class=\"sensor-val\">${s.val}</div>\n      <div class=\"sensor-unit-display\">\u2192 converter para ${s.unit}</div>\n      <div class=\"sensor-input-wrap\">\n        <input type=\"number\" class=\"sensor-input\" id=\"si-${i}\" placeholder=\"???\" step=\"0.1\">\n        <span class=\"sensor-unit\">${s.unit}</span>\n      </div>\n      <button class=\"sensor-check-btn\" onclick=\"checkSensor(${i},${idx})\">Calibrar</button>\n    </div>`).join('');\n  el.innerHTML=`\n    <div class=\"serial-box\">\n      <strong>S\u00c9RIE:</strong> ${serialNumber} &nbsp;|&nbsp; <strong>MOD-B</strong><br>\n      Informe ao Especialista o ID de cada sensor, o valor exibido e a unidade alvo.\n    </div>\n    <div class=\"challenge-box\">\n      <div class=\"challenge-title\">SISTEMA: Calibrador de Sensores T\u00e9rmicos</div>\n      <div class=\"challenge-desc\">Seis sensores exibem temperaturas em unidades variadas.<br>\n      O Especialista tem as f\u00f3rmulas no manual. Calculem juntos e calibre cada sensor.</div>\n      <div class=\"sensor-grid\" style=\"grid-template-columns:1fr 1fr\">${cards}</div>\n      <div id=\"fb-temp\" class=\"feedback\"></div>\n    </div>`;\n}\nfunction checkSensor(i,idx){\n  const inputEl=document.getElementById('si-'+i);\n  const fb=document.getElementById('fb-temp');\n  if(!inputEl||!fb) return; // defensive: content not loaded yet\n  playClick();\n  const val=parseFloat(inputEl.value);\n  if(isNaN(val)){fb.className='feedback err';fb.textContent='Digite um valor num\u00e9rico.';return;}\n  if(Math.abs(val-tempSensors[i].answer)<=1){\n    sensorOk[i]=true;\n    const card=document.getElementById('sc-'+i);\n    card.classList.add('calibrated');\n    card.querySelector('input').disabled=true;\n    card.querySelector('button').disabled=true;\n    fb.className='feedback ok';\n    fb.textContent='\u2713 '+tempSensors[i].id+' calibrado!';\n    playSuccess();\n    if(sensorOk.every(Boolean)){fb.textContent='\u2713 Todos os sensores calibrados! M\u00f3dulo restaurado.';markDone(idx);setTimeout(()=>{if(currentMod===idx)goPanel();},2000);}\n  } else {\n    fb.className='feedback err';\n    fb.textContent='\u2717 Valor incorreto para '+tempSensors[i].id+'. Reveja com o Especialista. +30s.';\n    addStrike();\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  MOD-C: PRIMEIRA LEI\n//  Q fica oculto; o manual d\u00e1 informa\u00e7\u00f5es para calcul\u00e1-lo (dados de rea\u00e7\u00e3o + Hess).\n//  Operador v\u00ea W e pede Q ao Especialista.\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// Cada cen\u00e1rio: W vis\u00edvel, Q oculto derivado de dados de rea\u00e7\u00e3o no manual.\nconst PL_SCENARIOS=[\n  {W:80,  hessId:'RXN-01', Q:150, answer:70,  min:-300,max:500},\n  {W:300, hessId:'RXN-02', Q:200, answer:-100, min:-300,max:500},\n  {W:120, hessId:'RXN-03', Q:50,  answer:-70,  min:-300,max:500},\n  {W:-50, hessId:'RXN-04', Q:0,   answer:50,   min:-200,max:300},\n  {W:200, hessId:'RXN-05', Q:350, answer:150,  min:-300,max:500},\n  {W:90,  hessId:'RXN-06', Q:240, answer:150,  min:-300,max:500},\n];\nlet plAnswer=0, currentPLScenario=null, plRound=0, plUsed=[];\n\nfunction pickPLScenario(){\n  const available=PL_SCENARIOS.map((_,i)=>i).filter(i=>!plUsed.includes(i));\n  const pick=available[Math.floor(Math.random()*available.length)];\n  plUsed.push(pick);\n  return PL_SCENARIOS[pick];\n}\nfunction buildPrimeiraLei(el,idx){\n  plRound=0; plUsed=[];\n  renderPLRound(el,idx);\n}\nfunction renderPLRound(el,idx){\n  currentPLScenario=pickPLScenario();\n  const c=currentPLScenario; plAnswer=c.answer;\n  const Wlabel=c.W<0?`${c.W} J (trabalho externo)`:`${c.W} J`;\n  el.innerHTML=`\n    <div class=\"serial-box\">\n      <strong>S\u00c9RIE:</strong> ${serialNumber} &nbsp;|&nbsp; <strong>MOD-C</strong> &nbsp;|&nbsp; Pergunta ${plRound+1}/3<br>\n      Diga ao Especialista: W = <strong>${c.W} J</strong> | ID da rea\u00e7\u00e3o = <strong>${c.hessId}</strong><br>\n      O Especialista calcular\u00e1 Q e dir\u00e1 o valor. Ent\u00e3o calcule \u0394U = Q \u2212 W.\n    </div>\n    <div class=\"challenge-box\">\n      <div class=\"challenge-title\">SISTEMA: Painel de Balan\u00e7o Energ\u00e9tico</div>\n      <div class=\"challenge-desc\">\n        O calor Q desta rea\u00e7\u00e3o est\u00e1 <strong style=\"color:var(--purple)\">OCULTO</strong> \u2014 o Especialista tem os dados no manual.<br>\n        Informe o ID da rea\u00e7\u00e3o e W. Ele calcular\u00e1 Q. Juntos achem \u0394U e ajuste o slider.\n      </div>\n      <div class=\"energy-meters\">\n        <div class=\"e-meter hidden-m\">\n          <div class=\"e-id\">${c.hessId}</div>\n          <div class=\"e-symbol\">Q (calor)</div>\n          <div class=\"e-value\">???</div>\n          <div class=\"e-unit\">ver manual</div>\n        </div>\n        <div class=\"e-meter\">\n          <div class=\"e-id\">VAR-W</div>\n          <div class=\"e-symbol\">W (trabalho)</div>\n          <div class=\"e-value\">${c.W}</div>\n          <div class=\"e-unit\">joules</div>\n        </div>\n        <div class=\"e-meter target\">\n          <div class=\"e-id\">VAR-U</div>\n          <div class=\"e-symbol\">\u0394U (energia interna)</div>\n          <div class=\"e-value\" id=\"du-display\">0</div>\n          <div class=\"e-unit\">joules</div>\n        </div>\n      </div>\n      <div class=\"slider-wrap\">\n        <div class=\"slider-row\">\n          <label>\u0394U =</label>\n          <input type=\"range\" min=\"${c.min}\" max=\"${c.max}\" value=\"0\" step=\"1\" id=\"du-slider\" oninput=\"updateDU()\">\n          <span class=\"slider-readout\" id=\"du-readout\">0 J</span>\n        </div>\n      </div>\n      <button class=\"btn-primary\" onclick=\"checkPL(${idx})\" style=\"margin-top:0\">Confirmar \u0394U</button>\n      <div id=\"fb-pl\" class=\"feedback\"></div>\n    </div>`;\n}\nfunction updateDU(){\n  const sl=document.getElementById('du-slider');\n  const disp=document.getElementById('du-display');\n  const ro=document.getElementById('du-readout');\n  if(!sl||!disp||!ro) return; // defensive: content not loaded yet\n  const v=parseInt(sl.value);\n  disp.textContent=v;\n  ro.textContent=v+' J';\n}\nfunction checkPL(idx){\n  const slEl=document.getElementById('du-slider');\n  const fb=document.getElementById('fb-pl');\n  if(!slEl||!fb) return; // defensive: content not loaded yet\n  playClick();\n  const v=parseInt(slEl.value);\n  if(Math.abs(v-plAnswer)<=3){\n    plRound++;\n    if(plRound>=3){\n      fb.className='feedback ok';\n      fb.textContent='\u2713 Tr\u00eas perguntas corretas! Balan\u00e7o normalizado. M\u00f3dulo restaurado.';\n      playSuccess();\n      markDone(idx); setTimeout(()=>{if(currentMod===idx)goPanel();},2000);\n    } else {\n      fb.className='feedback ok';\n      fb.textContent='\u2713 Correto! Pr\u00f3xima pergunta (' + (plRound+1) + '/3)...';\n      playSuccess();\n      const container=document.getElementById('mod-content');\n      setTimeout(()=>renderPLRound(container,idx),1200);\n    }\n  } else {\n    fb.className='feedback err';\n    fb.textContent='\u2717 Valor incorreto. Reveja Q com o Especialista. +30s.';\n    addStrike();\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  MOD-D: ENTROPIA (inalterado \u2014 j\u00e1 era bom)\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nconst PROCESSES=[\n  {icon:'\ud83d\udca8',text:'Expans\u00e3o de g\u00e1s em v\u00e1cuo (irrevers\u00edvel)',id:'PROC-01'},\n  {icon:'\ud83c\udf0a',text:'\u00c1gua evaporando (l\u00edquido \u2192 vapor)',id:'PROC-02'},\n  {icon:'\ud83e\uddca',text:'Gelo derretendo (s\u00f3lido \u2192 l\u00edquido)',id:'PROC-03'},\n  {icon:'\ud83c\udf21\ufe0f',text:'Aquecimento lento de s\u00f3lido',id:'PROC-04'},\n  {icon:'\ud83d\udd29',text:'Resfriamento revers\u00edvel de metal',id:'PROC-05'},\n];\nlet procOrder=[0,1,2,3,4], dragSrc=null;\n\nfunction buildEntropia(el,idx){\n  procOrder=[0,1,2,3,4].sort(()=>Math.random()-.5);\n  el.innerHTML=`\n    <div class=\"serial-box\">\n      <strong>S\u00c9RIE:</strong> ${serialNumber} &nbsp;|&nbsp; <strong>MOD-D</strong><br>\n      Informe ao Especialista os IDs dos processos <strong>na ordem atual</strong> (de cima para baixo).\n    </div>\n    <div class=\"challenge-box\">\n      <div class=\"challenge-title\">SISTEMA: C\u00e2mara de Classifica\u00e7\u00e3o de Processos</div>\n      <div class=\"challenge-desc\">Cinco processos est\u00e3o desordenados.<br>\n      Arraste para ordenar do <strong style=\"color:var(--text-bright)\">MAIOR</strong> ao <strong style=\"color:var(--text-bright)\">MENOR</strong> \u0394S. O Especialista tem a ordem no manual.</div>\n      <div class=\"drag-hint\">\u2195 ARRASTE PARA REORDENAR</div>\n      <div class=\"process-cards\" id=\"proc-list\"></div>\n      <button class=\"btn-primary\" onclick=\"checkEntropia(${idx})\" style=\"margin-top:1rem\">Confirmar ordena\u00e7\u00e3o</button>\n      <div id=\"fb-ent\" class=\"feedback\"></div>\n    </div>`;\n  renderProcs();\n}\nfunction renderProcs(){\n  const list=document.getElementById('proc-list'); list.innerHTML='';\n  procOrder.forEach((pi,pos)=>{\n    const p=PROCESSES[pi];\n    const card=document.createElement('div'); card.className='proc-card'; card.draggable=true;\n    card.innerHTML=`<div class=\"proc-rank\">${pos+1}</div><span class=\"proc-icon\">${p.icon}</span><div class=\"proc-text\">${p.text}<br><span style=\"font-size:10px;color:var(--purple)\">${p.id}</span></div>`;\n    card.addEventListener('dragstart',()=>{dragSrc=pos;card.classList.add('dragging');});\n    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragSrc=null;});\n    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});\n    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));\n    card.addEventListener('drop',e=>{\n      e.preventDefault();card.classList.remove('drag-over');\n      if(dragSrc===null||dragSrc===pos)return;\n      const tmp=procOrder[dragSrc];procOrder[dragSrc]=procOrder[pos];procOrder[pos]=tmp;\n      renderProcs();\n    });\n    list.appendChild(card);\n  });\n}\nfunction checkEntropia(idx){\n  const fb=document.getElementById('fb-ent');\n  if(!fb) return; // defensive: content not loaded yet\n  playClick();\n  if(procOrder.every((v,i)=>v===i)){\n    fb.className='feedback ok';\n    fb.textContent='\u2713 Ordem correta! Expans\u00e3o > Evapora\u00e7\u00e3o > Fus\u00e3o > Aquecimento > Resfriamento. M\u00f3dulo restaurado.';\n    playSuccess();\n    markDone(idx); setTimeout(()=>{if(currentMod===idx)goPanel();},2500);\n  } else {\n    fb.className='feedback err';\n    fb.textContent='\u2717 Ordem incorreta. Consulte o Especialista. +30s.';\n    addStrike();\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  MOD-E: CICLO TERMODIN\u00c2MICO\n//  Randomizado por modelo de reator (ALFA/BETA/GAMA/DELTA).\n//  Painel mostra s\u00f3 ID do processo + vari\u00e1vel observada (sem o nome).\n//  Manual tem a tabela completa por modelo.\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// Cada modelo tem 4 processos em ordem, com diferentes vari\u00e1veis\nconst CICLO_MODELS={\n  ALFA:[\n    {id:'CIC-A1', varObs:'T = constante, V \u2191',      correct:'Isot\u00e9rmico'},\n    {id:'CIC-A2', varObs:'P = constante, V \u2193',      correct:'Isob\u00e1rico'},\n    {id:'CIC-A3', varObs:'V = constante, P \u2193',      correct:'Isoc\u00f3rico'},\n    {id:'CIC-A4', varObs:'Q = 0, T \u2193',              correct:'Adiab\u00e1tico'},\n  ],\n  BETA:[\n    {id:'CIC-B1', varObs:'Q = 0, V \u2191',              correct:'Adiab\u00e1tico'},\n    {id:'CIC-B2', varObs:'V = constante, P \u2191',      correct:'Isoc\u00f3rico'},\n    {id:'CIC-B3', varObs:'P = constante, V \u2191',      correct:'Isob\u00e1rico'},\n    {id:'CIC-B4', varObs:'T = constante, V \u2193',      correct:'Isot\u00e9rmico'},\n  ],\n  GAMA:[\n    {id:'CIC-G1', varObs:'P = constante, T \u2191',      correct:'Isob\u00e1rico'},\n    {id:'CIC-G2', varObs:'T = constante, P \u2191',      correct:'Isot\u00e9rmico'},\n    {id:'CIC-G3', varObs:'Q = 0, P \u2191',              correct:'Adiab\u00e1tico'},\n    {id:'CIC-G4', varObs:'V = constante, T \u2193',      correct:'Isoc\u00f3rico'},\n  ],\n  DELTA:[\n    {id:'CIC-D1', varObs:'V = constante, T \u2191',      correct:'Isoc\u00f3rico'},\n    {id:'CIC-D2', varObs:'Q = 0, T \u2191',              correct:'Adiab\u00e1tico'},\n    {id:'CIC-D3', varObs:'T = constante, P \u2193',      correct:'Isot\u00e9rmico'},\n    {id:'CIC-D4', varObs:'P = constante, V \u2193',      correct:'Isob\u00e1rico'},\n  ],\n};\nlet cicloStepsActive=[], cicloSel=[], cicloOk=[];\n\nfunction buildCiclo(el,idx){\n  cicloStepsActive=[...CICLO_MODELS[reactorModel]].sort(()=>Math.random()-.5);\n  cicloSel=Array(4).fill(null); cicloOk=Array(4).fill(false);\n  const stepsHtml=cicloStepsActive.map((s,i)=>`\n    <div class=\"ciclo-step\" id=\"cs-${i}\">\n      <div class=\"step-num\">${i+1}</div>\n      <div class=\"step-info\">\n        <div class=\"step-name\">Processo <span style=\"color:var(--purple)\">${s.id}</span></div>\n        <div class=\"step-select\" id=\"step-opts-${i}\">\n          ${['Isot\u00e9rmico','Isob\u00e1rico','Isoc\u00f3rico','Adiab\u00e1tico'].map(opt=>`<button class=\"step-opt\" onclick=\"selectCicloOpt(${i},'${opt}',${idx})\">${opt}</button>`).join('')}\n        </div>\n      </div>\n    </div>`).join('');\n  el.innerHTML=`\n    <div class=\"serial-box\">\n      <strong>S\u00c9RIE:</strong> ${serialNumber} &nbsp;|&nbsp; <strong>MOD-E</strong><br>\n      Diga ao Especialista: <strong>Modelo do Reator = ${reactorModel}</strong><br>\n      Ele consultar\u00e1 a tabela e dir\u00e1 as caracter\u00edsticas de cada processo pelo ID.\n    </div>\n    <div class=\"challenge-box\">\n      <div class=\"challenge-title\">SISTEMA: Identificador de Processos do Ciclo</div>\n      <div class=\"challenge-desc\">\n        Informe o <strong>modelo \"${reactorModel}\"</strong> ao Especialista.<br>\n        Para cada processo, ele dir\u00e1 as caracter\u00edsticas. Discutam e selecionem o tipo correto.\n      </div>\n      <div class=\"reactor-model-badge\">MODELO: ${reactorModel}</div>\n      <div class=\"ciclo-steps\">${stepsHtml}</div>\n      <div id=\"fb-ciclo\" class=\"feedback\"></div>\n    </div>`;\n}\nfunction selectCicloOpt(stepIdx,opt,modIdx){\n  const optsEl=document.getElementById('step-opts-'+stepIdx);\n  if(!optsEl) return; // defensive: content not loaded yet\n  playClick();\n  cicloSel[stepIdx]=opt;\n  optsEl.querySelectorAll('.step-opt').forEach(btn=>{\n    btn.classList.remove('selected-opt');\n    if(btn.textContent===opt) btn.classList.add('selected-opt');\n  });\n  if(cicloSel.every(v=>v!==null)) checkCiclo(modIdx);\n}\nfunction checkCiclo(idx){\n  const fb=document.getElementById('fb-ciclo');\n  if(!fb) return; // defensive: content not loaded yet\n  let allOk=true;\n  cicloStepsActive.forEach((s,i)=>{\n    const opts=document.getElementById('step-opts-'+i);\n    const step=document.getElementById('cs-'+i);\n    if(!opts||!step) return;\n    if(cicloSel[i]===s.correct){\n      cicloOk[i]=true;\n      opts.querySelectorAll('.step-opt').forEach(b=>{if(b.textContent===s.correct)b.classList.add('correct-opt');});\n      step.classList.add('done-step');\n    } else {\n      allOk=false;\n      opts.querySelectorAll('.step-opt').forEach(b=>{if(b.textContent===cicloSel[i])b.classList.add('wrong-opt');});\n    }\n  });\n  if(allOk){\n    fb.className='feedback ok';\n    fb.textContent='\u2713 Ciclo identificado corretamente! M\u00f3dulo restaurado.';\n    playSuccess();\n    markDone(idx); setTimeout(()=>{if(currentMod===idx)goPanel();},2000);\n  } else {\n    fb.className='feedback err';\n    fb.textContent='\u2717 Um ou mais processos incorretos. Reveja com o Especialista. +30s.';\n    setTimeout(()=>{\n      cicloStepsActive.forEach((_,i)=>{\n        if(!cicloOk[i]){\n          cicloSel[i]=null;\n          const o=document.getElementById('step-opts-'+i);\n          if(o) o.querySelectorAll('.step-opt').forEach(b=>b.classList.remove('selected-opt','wrong-opt','correct-opt'));\n        }\n      });\n      fb.className='feedback';\n    },1500);\n    addStrike();\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  MOD-F: C\u00d3DIGO DE IGNI\u00c7\u00c3O (inalterado \u2014 depende do serial)\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nlet ignCode=[], ignTarget=[];\nconst IGN_POOL=['\u0394','Q','W','T','S','P','V','U','R','H'];\n\nfunction buildCodigo(el,idx){\n  ignCode=[]; ignTarget=[];\n  const sm=serialSum;\n  ignTarget.push(sm%2===0?'Q':'T');\n  ignTarget.push('S');\n  ignTarget.push(serialHasVowel?'U':'W');\n  ignTarget.push(sm>12?'H':'\u0394');\n  ignTarget.push('R');\n  el.innerHTML=`\n    <div class=\"serial-box\">\n      <strong>S\u00c9RIE:</strong> ${serialNumber} &nbsp;|&nbsp; <strong>MOD-F</strong><br>\n      Diga ao Especialista: S\u00e9rie = <strong>${serialNumber}</strong> | Soma = <strong>${serialSum}</strong> | Vogal = <strong>${serialHasVowel?'SIM':'N\u00c3O'}</strong>\n    </div>\n    <div class=\"challenge-box\">\n      <div class=\"challenge-title\">SISTEMA: Terminal de C\u00f3digo de Igni\u00e7\u00e3o</div>\n      <div class=\"challenge-desc\">O sistema exige um c\u00f3digo de 5 s\u00
